<body>
<div id="app"></div>

<!--
  Script load order matters (no bundler, script tags share global scope):
    1. state       — appState + persistence + concept helpers
    2. utils/icons — pure helpers used everywhere
    3. clara/*     — extraction, canned copy, task generation
    4. components  — top bar, sidebar (retired widget kept as stub)
    5. screens/*   — each view / route
    6. router.js   — renderApp() dispatch
    7. main.js     — entry point (DOMContentLoaded)
-->

<script src="src/state.js"></script>
<script src="src/utils.js"></script>
<script src="src/icons.js"></script>

<script src="src/clara/extractor.js"></script>
<script src="src/clara/responses.js"></script>

<script src="src/components/newConceptModal.js"></script>

<script src="src/screens/splash.js"></script>

<script src="src/router.js"></script>
<script src="src/main.js"></script>
</body>
