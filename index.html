/* ===================== LAUNCHPAD HOME ===================== */
/* The one proactive "your strategy is ready" moment — shown only when the
   active concept has finished all three research modules, has a persona,
   and has reached GTM. This is the graduation screen into Content Studio. */
function _lpFirstMoveChannel(bizType) {
  var reach = window.SPR_REACH_DATA && (window.SPR_REACH_DATA[bizType] || window.SPR_REACH_DATA.other);
  if (!reach || !reach.channels || !reach.channels.length) return 'Start with content';
  var name = String(reach.channels[0]).split(/\s*\u2014\s*/)[0].trim();
  return name || 'Start with content';
}

function _lpEsc(str) {
  return String(str == null ? '' : str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

/* First sentence of a string (up to and including the first period), trimmed */
function _lpFirstSentence(text) {
  var t = String(text || '').trim();
  if (!t) return '';
  var idx = t.indexOf('. ');
  if (idx === -1) return t.replace(/\.$/, '') + '.';
  return t.slice(0, idx + 1);
}

/* Build the three AI content suggestions from real concept data, with a
   sensible fallback for every field so nothing ever renders undefined/blank */
function _lpSuggestions(concept) {
  var s = (concept && concept.strategy) || {};
  var p = (concept && concept.persona)  || {};
  var g = (concept && concept.gtm)      || {};
  var bizType = (concept && concept.business && concept.business.type) || 'other';

  var personaName = (p.name && p.name.trim()) ? p.name.trim() : 'your customer';

  /* Card 1 — SOCIAL POST, angle from the market gap headline */
  var gapHeadline = (s.marketScan && s.marketScan.gapHeadline && s.marketScan.gapHeadline.trim())
    ? s.marketScan.gapHeadline.trim()
    : 'There\u2019s a clear opening in your market no one owns yet.';
  var card1 = {
    variant: 'amber', type: 'Social Post',
    angle: gapHeadline,
    why: 'A social post built around this gap speaks directly to what ' + personaName + ' is already looking for.'
  };

  /* Card 2 — EMAIL, angle from the persona's top caresAbout chip */
  var topCare = (p.caresAbout && p.caresAbout.length && String(p.caresAbout[0]).trim())
    ? String(p.caresAbout[0]).trim()
    : '';
  var whitespaceRaw = (s.competition && s.competition.whitespace && s.competition.whitespace.trim())
    ? s.competition.whitespace.trim()
    : '';
  var whitespaceShort = whitespaceRaw ? _lpFirstSentence(whitespaceRaw) : 'the space your competitors are leaving wide open';
  var card2 = {
    variant: 'teal', type: 'Email',
    angle: topCare ? 'Lead your next email with ' + topCare + '.' : 'Lead your next email with what your customer values most.',
    why: whitespaceRaw
      ? 'It\u2019s how you claim the whitespace your research found: \u201c' + whitespaceShort + '\u201d'
      : 'It\u2019s how you claim ' + whitespaceShort + ' before a competitor does.'
  };

  /* Card 3 — CAMPAIGN, angle from the first GTM action, else the reach channel */
  var firstAction = (g.plan && g.plan.actions && g.plan.actions.length && g.plan.actions[0] && g.plan.actions[0].title)
    ? String(g.plan.actions[0].title).trim()
    : '';
  var channel = _lpFirstMoveChannel(bizType);
  var trigger = (p.trigger && p.trigger.trim()) ? p.trigger.trim() : '';
  var card3 = {
    variant: 'purple', type: 'Campaign',
    angle: firstAction ? firstAction : 'Kick off your first campaign on ' + channel + '.',
    why: trigger
      ? 'Build the campaign around what moves ' + personaName + ': \u201c' + trigger + '\u201d'
      : 'Build the campaign around what moves ' + personaName + ' to act.'
  };

  return [card1, card2, card3];
}

function _lpSuggestionCard(card) {
  return '<div class="lp-card lp-card-' + card.variant + ' lp-suggest-card">'
    + '<div class="lp-card-label">' + _lpEsc(card.type) + '</div>'
    + '<div class="lp-suggest-angle">' + _lpEsc(card.angle) + '</div>'
    + '<div class="lp-suggest-why">' + _lpEsc(card.why) + '</div>'
    + '<a class="lp-suggest-use" onclick="claritySyncConceptToStudio(); setMode(\'home\')">Use this &#8594;</a>'
    + '</div>';
}

function screenLaunchpadHome() {
  var concept = window.clarityActiveConcept ? window.clarityActiveConcept() : null;

/* The returning user's home base — a fixed sidebar listing every concept in
   flight, and a right panel showing the active concept's research progress
   with a single "Continue" action that routes to the correct next step. */
var DSH_TYPE_LABELS = { food: 'Food & Hospitality', retail: 'Retail & Products', creative: 'Creative & Design', tech: 'Tech & Software', trades: 'Trades & Services', other: 'Other' };

function _dshPinIcon() {
  return '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20.9 10.3c0 6.5-8.9 12-8.9 12s-8.9-5.5-8.9-12a8.9 8.9 0 1117.8 0z"/><circle cx="12" cy="10.3" r="3"/></svg>';
}

/* Where "Continue" (and the fully-complete state) should take the user */
function _dshContinueDest(concept) {
  var s = (concept && concept.strategy) || {};
  var p = (concept && concept.persona) || {};
  var allThree = !!(s.marketScan && s.customerIntelligence && s.competition);
  var hasPersona = !!(p.name && p.name.trim());
  if (!allThree) return 'strategic-plan';
  if (!hasPersona) return 'persona-studio';
  if (!concept.gtmComplete) return 'gtm-strategy';
  return 'home';
}

/* Reset the shared UI-position trackers (strategyFlow/personaFlow) to match
   whichever concept is active, so jumping into a module always lands somewhere sane */
function _dshSyncFlowsForConcept(concept) {
  var s = (concept && concept.strategy) || {};
  var g = (concept && concept.gtm) || {};
  appState.strategyFlow = {
    screen: 'hub',
    returnTo: 'dashboard',
    marketScan:    { step: s.marketScan           ? 3 : 1, focus: '' },
    customerIntel: { step: s.customerIntelligence ? 3 : 1, focus: '' },
    competition:   { step: s.competition          ? 3 : 1, focus: '' }
  };
  /* Persona: if it's already complete, jump straight to the Step 4 summary and
     route its back button to the dashboard; otherwise start at the entry screen */
  var p = (concept && concept.persona) || {};
  var personaDone = !!(p.name && p.name.trim());
  appState.personaFlow = personaDone
    ? { step: 4, subStep: 1, screen: 'steps', suggestionActive: false, returnTo: 'dashboard' }
    : { step: 1, subStep: 1, screen: 'entry', suggestionActive: false };

  /* GTM: if complete, jump straight to the finished pricing-output and route its
     back button to the dashboard; else resume at Pricing if the plan exists,
     otherwise start fresh */
  var planDone = !!(g.plan && g.plan.actions && g.plan.actions.length);
  var gtmDone = !!(concept && concept.gtmComplete);
  var savedPricingInputs = (g.pricing && g.pricing.inputs) || {};
  appState.gtmFlow = {
    step: gtmDone ? 'pricing-output' : (planDone ? 'pricing-context' : 'plan-context'),
    returnTo: gtmDone ? 'dashboard' : '',
    _conceptId: concept ? concept.id : null,
    planFocus: '',
    pricingInputs: {
      avgOrder:   savedPricingInputs.avgOrder   || '',
      marketAvg:  savedPricingInputs.marketAvg  || '',
      margin:     savedPricingInputs.margin     || '',
      bestSeller: savedPricingInputs.bestSeller || ''
    }
  };
}

  var typeLabel = DSH_TYPE_LABELS[biz.type] || (biz.type ? biz.type : 'Untitled');

function _dshContentPanel(concept) {
  if (!concept) return '<div class="dsh-content"></div>';

  var biz = concept.business || {};
  var s   = concept.strategy || {};
  var p   = concept.persona  || {};
  var g   = concept.gtm      || {};

  var rawName = (biz.name || '').trim();
  var nameHtml = rawName.length > 1 ? rawName : '<span class="dsh-unnamed">Unnamed concept</span>';
  var typeLabel = DSH_TYPE_LABELS[biz.type] || '';
  var locs = biz.locations || [];
  var locLabel = locs.length ? (locs[0] === 'Global' ? 'Global' : locs.join(', ')) : '';
  var metaParts = [];
  if (typeLabel) metaParts.push(typeLabel);
  if (locLabel) metaParts.push(locLabel);
  var metaLine = metaParts.length ? metaParts.join(' \u00b7 ') : '';

  var marketDone  = !!s.marketScan;
  var custDone    = !!s.customerIntelligence;
  var compDone    = !!s.competition;
  var personaDone = !!(p.name && p.name.trim());
  var gtmDone     = !!concept.gtmComplete;

  var pillars = [
    { key: 'market',   name: 'Market Scan',          done: marketDone,  mode: 'strategic-plan' },
    { key: 'customer', name: 'Customer Intelligence', done: custDone,    mode: 'strategic-plan' },
    { key: 'comp',     name: 'Competition',           done: compDone,    mode: 'strategic-plan' },
    { key: 'persona',  name: 'Persona',               done: personaDone, mode: 'persona-studio' },
    { key: 'gtm',      name: 'GTM',                   done: gtmDone,    mode: 'gtm-strategy' }
  ];

  var doneCount = 0;
  var nextPillar = null;
  pillars.forEach(function (pil) {
    if (pil.done) doneCount++;
    if (!pil.done && !nextPillar) nextPillar = pil;
  });
  var allDone = doneCount === 5;
  var pct = doneCount * 20;

  /* SECTION 1 — Identity bar */
  var sec1 = '<div class="dsh-journey-identity">'
    + '<div class="dsh-journey-biz-name' + (rawName.length > 1 ? '' : ' dsh-unnamed') + '">' + nameHtml + '</div>'
    + (metaLine ? '<div class="dsh-journey-biz-meta">' + metaLine + '</div>' : '')
    + '<div class="dsh-journey-amber-line"></div>'
    + '</div>';

  /* SECTION 2 — Progress moment */
  var sec2 = '<div class="dsh-journey-progress">'
    + '<div class="dsh-journey-progress-label">Your strategy is ' + pct + '% complete.</div>'
    + '<div class="dsh-journey-progress-track"><div class="dsh-journey-progress-fill" style="width:' + pct + '%"></div></div>'
    + '</div>';

  /* SECTION 3 — Insight cards (complete) or next step card (incomplete) */
  var sec3 = '';
  var secMoves = '';
  var secCta = '';
  if (allDone) {
    /* ---- Card 1: MARKET GAP ---- */
    var gapMain = (s.marketScan && s.marketScan.gapHeadline && s.marketScan.gapHeadline.trim())
      ? s.marketScan.gapHeadline.trim() : 'Your opportunity identified.';
    var gapSubRaw = (s.marketScan && s.marketScan.gapText && s.marketScan.gapText.trim())
      ? s.marketScan.gapText.trim() : '';
    var gapSub = gapSubRaw
      ? _dshTruncate(gapSubRaw, 80)
      : 'A clear opening your competitors have left unaddressed.';

    /* ---- Card 2: YOUR CUSTOMER ---- */
    var personaLine = (p.name ? p.name.trim() : '') + (p.ageRange ? ', ' + p.ageRange : '');
    if (!personaLine) personaLine = 'Your customer';
    var caresPart = (p.caresAbout && p.caresAbout.length)
      ? p.caresAbout.slice(0, 2).filter(Boolean).join(' \u00b7 ') : '';
    var trigPart = (p.trigger && p.trigger.trim())
      ? p.trigger.trim().substring(0, 40) : '';
    var personaSub = [caresPart, trigPart].filter(Boolean).join(' \u00b7 ');
    if (!personaSub) personaSub = 'What your customer values most.';

    /* ---- Card 3: YOUR EDGE ---- */
    var wsRaw = (s.competition && s.competition.whitespace && s.competition.whitespace.trim()) || '';
    var edgeMain;
    if (wsRaw) {
      var firstEnd = wsRaw.search(/[.!?](\s|$)/);
      edgeMain = firstEnd >= 0 ? wsRaw.substring(0, firstEnd + 1) : _dshTruncate(wsRaw, 80);
    } else {
      edgeMain = 'Whitespace identified in your market.';
    }
    var edgeSub = 'Whitespace your competitors haven\u2019t claimed yet.';

    sec3 = '<div class="dsh-journey-insight-cards">'
      + '<div class="dsh-journey-insight-card" style="--accent:var(--ob-gold)" onclick="viewStrategicPlanReport()">'
      + '<div class="dsh-journey-insight-card-eye" style="color:var(--ob-gold)">MARKET GAP</div>'
      + '<div class="dsh-journey-insight-card-val">' + gapMain + '</div>'
      + '<div class="dsh-journey-insight-card-sub">' + gapSub + '</div>'
      + '</div>'
      + '<div class="dsh-journey-insight-card" style="--accent:var(--ob-teal)" onclick="dshGoModule(\'persona-studio\')">'
      + '<div class="dsh-journey-insight-card-eye" style="color:var(--ob-teal)">YOUR CUSTOMER</div>'
      + '<div class="dsh-journey-insight-card-val">' + personaLine + '</div>'
      + '<div class="dsh-journey-insight-card-sub">' + personaSub + '</div>'
      + '</div>'
      + '<div class="dsh-journey-insight-card" style="--accent:var(--ob-coral)" onclick="viewStrategicPlanReport()">'
      + '<div class="dsh-journey-insight-card-eye" style="color:var(--ob-coral)">YOUR EDGE</div>'
      + '<div class="dsh-journey-insight-card-val">' + edgeMain + '</div>'
      + '<div class="dsh-journey-insight-card-sub">' + edgeSub + '</div>'
      + '</div>'
      + '</div>';

    var actions = (g.plan && g.plan.actions && g.plan.actions.length) ? g.plan.actions : [];
    if (actions.length) {
      var moveRows = '';
      for (var mi = 0; mi < Math.min(2, actions.length); mi++) {
        var act = actions[mi];
        var ownerChip = (act.owner && act.owner.trim())
          ? '<span class="dsh-journey-move-owner">' + act.owner.trim() + '</span>' : '';
        moveRows += '<div class="dsh-journey-move-row">'
          + '<span class="dsh-journey-move-num">' + (mi + 1) + '</span>'
          + '<span class="dsh-journey-move-title">' + (act.title || '') + '</span>'
          + ownerChip
          + '</div>';
      }
      secMoves = '<div class="dsh-journey-moves">'
        + '<div class="dsh-journey-moves-label"><span>YOUR FIRST MOVES</span></div>'
        + moveRows
        + '<div class="dsh-journey-action-bar">'
        + '<span class="dsh-journey-action-bar-link dsh-journey-action-bar-gold" onclick="dshGoModule(\'gtm-strategy\')">View full GTM plan &#8594;</span>'
        + '<span class="dsh-journey-action-bar-divider"></span>'
        + '<span class="dsh-journey-action-bar-link dsh-journey-action-bar-teal" style="text-align:right" onclick="setMode(\'gtm-tasks\')">Manage tasks &#8594;</span>'
        + '</div>'
        + '</div>';
    }

    secCta = '<div class="dsh-journey-cta-caption">Your strategy is ready. Time to create.</div>'
      + '<button class="dsh-journey-btn dsh-journey-btn-cta" onclick="claritySyncConceptToStudio(); setMode(\'home\')">Go to Content Studio &#8594;</button>';
  } else if (nextPillar) {
    var _desc = {
      market:   'Understand what\u2019s happening in your market before making any moves.',
      customer: 'Find out exactly who is buying and what makes them decide.',
      comp:     'Map the landscape and find the gap only you can own.',
      persona:  'Turn your research into a real person you are building for.',
      gtm:      'Turn everything you know into a 90-day action plan and pricing strategy.'
    };

    var teaser = '';
    if (nextPillar.key === 'customer' && marketDone && s.marketScan.gapHeadline) {
      teaser = 'Your market gap is: ' + s.marketScan.gapHeadline;
    } else if (nextPillar.key === 'comp' && custDone && s.customerIntelligence.topTrigger) {
      teaser = 'Your top customer trigger is: ' + s.customerIntelligence.topTrigger;
    } else if (nextPillar.key === 'persona' && compDone && s.competition.whitespace) {
      teaser = 'Your whitespace opportunity: ' + _dshTruncate(s.competition.whitespace, 80);
    } else if (nextPillar.key === 'gtm' && personaDone) {
      var caresFirst = (p.caresAbout && p.caresAbout.length) ? p.caresAbout[0] : '';
      teaser = 'Building for: ' + p.name.trim() + ', ' + (p.ageRange || '') + (caresFirst ? ' \u2014 responds to ' + caresFirst : '');
    }
    var teaserHtml = teaser ? '<div class="dsh-journey-next-teaser">' + teaser + '</div>' : '';

    sec3 = '<div class="dsh-journey-next-card">'
      + '<div class="dsh-journey-next-eyebrow">&#8599; UP NEXT</div>'
      + '<div class="dsh-journey-next-name">' + nextPillar.name + '</div>'
      + '<div class="dsh-journey-next-desc">' + _desc[nextPillar.key] + '</div>'
      + teaserHtml
      + '<button class="dsh-journey-btn" onclick="dshGoModule(\'' + nextPillar.mode + '\')">Continue &#8594;</button>'
      + '</div>';
  }

  /* SECTION 4 — Completed pillars */
  var sec4 = '';
  if (doneCount > 0) {
    var lines = '';
    /* The trailing arrow only renders in the completed-state scope
       (styled via .dsh-content-complete .dsh-journey-done-arrow). */
    var _doneArrow = allDone ? '<span class="dsh-journey-done-arrow">&#8594;</span>' : '';

    if (marketDone) {
      var mI = _dshTruncate(s.marketScan.gapHeadline, 50) || '';
      lines += '<div class="dsh-journey-done-item" onclick="viewStrategicPlanReport()">'
        + '<div class="dsh-journey-done-top"><span class="dsh-journey-done-check">\u2713</span><span class="dsh-journey-done-name">Market Scan</span></div>'
        + (mI ? '<div class="dsh-journey-done-insight">' + mI + '</div>' : '')
        + _doneArrow
        + '</div>';
    }
    if (custDone) {
      var cI = _dshTruncate(s.customerIntelligence.topTrigger, 50) || '';
      lines += '<div class="dsh-journey-done-item" onclick="viewStrategicPlanReport()">'
        + '<div class="dsh-journey-done-top"><span class="dsh-journey-done-check">\u2713</span><span class="dsh-journey-done-name">Customer Intelligence</span></div>'
        + (cI ? '<div class="dsh-journey-done-insight">' + cI + '</div>' : '')
        + _doneArrow
        + '</div>';
    }
    if (compDone) {
      var coI = _dshTruncate(s.competition.whitespace, 50) || '';
      lines += '<div class="dsh-journey-done-item" onclick="viewStrategicPlanReport()">'
        + '<div class="dsh-journey-done-top"><span class="dsh-journey-done-check">\u2713</span><span class="dsh-journey-done-name">Competition</span></div>'
        + (coI ? '<div class="dsh-journey-done-insight">' + coI + '</div>' : '')
        + _doneArrow
        + '</div>';
    }
    if (personaDone) {
      var pI = p.name.trim() + ((p.caresAbout && p.caresAbout.length) ? ' \u00b7 ' + p.caresAbout[0] : '');
      lines += '<div class="dsh-journey-done-item" onclick="dshGoModule(\'persona-studio\')">'
        + '<div class="dsh-journey-done-top"><span class="dsh-journey-done-check">\u2713</span><span class="dsh-journey-done-name">Persona</span></div>'
        + '<div class="dsh-journey-done-insight">' + _dshTruncate(pI, 50) + '</div>'
        + _doneArrow
        + '</div>';
    }
    if (gtmDone) {
      lines += '<div class="dsh-journey-done-item" onclick="dshGoModule(\'gtm-strategy\')">'
        + '<div class="dsh-journey-done-top"><span class="dsh-journey-done-check">\u2713</span><span class="dsh-journey-done-name">GTM</span></div>'
        + '<div class="dsh-journey-done-insight">Plan + Pricing locked in.</div>'
        + _doneArrow
        + '</div>';
    }

    var completedLabelHtml = allDone
      ? '<div class="dsh-journey-completed-label"><span><span class="dsh-journey-completed-dot"></span>COMPLETED</span></div>'
      : '<div class="dsh-journey-completed-label">COMPLETED</div>';

    sec4 = '<div class="dsh-journey-completed">'
      + completedLabelHtml
      + lines
      + '</div>';
  }

  return '<div class="dsh-content' + (allDone ? ' dsh-content-complete' : '') + '">'
    + sec1 + sec2 + sec3 + secMoves + sec4 + secCta
    + '</div>';
}

function screenDashboard() {
  var concepts = appState.concepts || [];
  var active = window.clarityActiveConcept ? window.clarityActiveConcept() : null;

  /* Auto-open the nudge dropdown the first time the dashboard renders while
     eligible for this concept, so the user sees it without clicking the
     bell. Tracked per concept id so it only fires once — after that the
     user can freely open/close it via the bell without it forcing back open. */
  var bellEligible = !!(active && active.gtmComplete && active.contentNudgeSeen !== true);
  if (bellEligible && appState._dshBellAutoOpenedFor !== active.id) {
    appState.dshBellOpen = true;
    appState._dshBellAutoOpenedFor = active.id;
  }

  return '<div class="dsh-wrap">'
    + _dshSidebar(concepts)
    + _dshContentPanel(active)
    + _dshBellHtml(active)
    + '</div>';
}

/* ---- Content Studio nudge bell — dashboard only ----
   Shown once a concept's GTM is locked in and the user hasn't been
   nudged toward Content Studio yet (or hasn't dismissed the nudge). */
function _dshBellHtml(concept) {
  if (!concept || !concept.gtmComplete || concept.contentNudgeSeen === true) return '';

  var dropdown = '';
  if (appState.dshBellOpen) {
    dropdown = '<div class="dsh-bell-dropdown" onclick="event.stopPropagation()">'
      + '<div class="dsh-bell-new-badge">NEW</div>'
      + '<div class="dsh-bell-heading">Your strategy is ready.</div>'
      + '<div class="dsh-bell-body">Your strategy is complete. Head to Content Studio to start creating content grounded in your research.</div>'
      + '<button class="dsh-bell-cta" onclick="dshBellShowMe()">Show me &#8594;</button>'
      + '<span class="dsh-bell-dismiss" onclick="dshBellDismiss()">Dismiss</span>'
      + '</div>';
  }

  return '<div class="dsh-bell-btn" id="dsh-bell-btn" onclick="dshToggleBell(event)">'
    + '<span style="font-size:16px">&#128276;</span>'
    + '<span class="dsh-bell-dot"></span>'
    + dropdown
    + '</div>';
}

window.dshToggleBell = function (event) {
  if (event) event.stopPropagation();
  appState.dshBellOpen = !appState.dshBellOpen;
  renderApp();
};

window.dshBellShowMe = function () {
  var c = window.clarityActiveConcept ? window.clarityActiveConcept() : null;
  if (c) c.contentNudgeSeen = true;
  appState.dshBellOpen = false;
  _saveLaunchpadState();
  claritySyncConceptToStudio();
  setMode('home');
};

window.dshBellDismiss = function () {
  var c = window.clarityActiveConcept ? window.clarityActiveConcept() : null;
  if (c) c.contentNudgeSeen = true;
  appState.dshBellOpen = false;
  _saveLaunchpadState();
  renderApp();
};

/* Close the bell dropdown on any click outside the bell button/dropdown. */
document.addEventListener('click', function (event) {
  if (!appState.dshBellOpen) return;
  var bell = document.getElementById('dsh-bell-btn');
  if (bell && !bell.contains(event.target)) {
    appState.dshBellOpen = false;
    renderApp();
  }
});

/* ---- Handlers ---- */
window.dshSelectConcept = function (id) {
  appState.activeConceptId = id;
  /* Re-sync strategyFlow / personaFlow / gtmFlow to the newly active concept
     so any downstream screen (GTM completed briefing, persona chat back nav,
     strategy hub step positions) reads that concept's data instead of stale
     state from the previously active concept. */
  var c = window.clarityActiveConcept ? window.clarityActiveConcept() : null;
  _dshSyncFlowsForConcept(c);
  renderApp();
};

window.dshGoModule = function (mode) {
  var c = window.clarityActiveConcept ? window.clarityActiveConcept() : null;
  _dshSyncFlowsForConcept(c);
  if (appState.strategyFlow) {
    var s = (c && c.strategy) || {};
    var allResearchComplete = !!(s.marketScan && s.customerIntelligence && s.competition);
    appState.strategyFlow.returnTo = allResearchComplete ? 'dashboard' : null;
  }
  setMode(mode);
};

window.dshContinue = function () {
  var c = window.clarityActiveConcept ? window.clarityActiveConcept() : null;
  if (!c) return;
  _dshSyncFlowsForConcept(c);
  setMode(_dshContinueDest(c));
};

window.dshCreateConcept = function () {
  window.clarityCreateConcept({});
  appState.onboarding = { step: 3, subStep: 1, authMode: (appState.onboarding && appState.onboarding.authMode) || 'signup' };
  if (appState.strategyFlow) appState.strategyFlow.returnTo = null;
  _saveLaunchpadState();
  setMode('onboarding');
};

/* ===================== GTM TASKS BOARD ===================== */
/* Kanban / list board over concept.gtm.plan.actions, reached from the
   dashboard "View full GTM plan →" link. Task status ('todo' | 'inprogress'
   | 'done') is stored per-action on the concept, so it persists via the
   existing localStorage snapshot of appState.concepts. */

function _gtmtActions() {
  var c = window.clarityActiveConcept ? window.clarityActiveConcept() : null;
  return (c && c.gtm && c.gtm.plan && Array.isArray(c.gtm.plan.actions))
    ? c.gtm.plan.actions : [];
}

/* Ensure every action has a status; mutates in place, returns the array. */
function _gtmtEnsureStatuses(actions) {
  actions.forEach(function (a) {
    if (a.status !== 'todo' && a.status !== 'inprogress' && a.status !== 'done') {
      a.status = 'todo';
    }
  });
  return actions;
}

function _gtmtRerender() {
  renderApp();
}

window.gtmSetTaskStatus = function (actionIndex, status) {
  if (status !== 'todo' && status !== 'inprogress' && status !== 'done') return;
  var c = window.clarityActiveConcept ? window.clarityActiveConcept() : null;
  if (!c || !c.gtm || !c.gtm.plan || !Array.isArray(c.gtm.plan.actions)) return;
  var actions = c.gtm.plan.actions;
  if (actionIndex < 0 || actionIndex >= actions.length) return;
  actions[actionIndex].status = status;
  _saveLaunchpadState();
  _gtmtRerender();
};

/* Cycle todo → inprogress → done → todo (used by the list-view checkbox). */
window.gtmCycleTaskStatus = function (actionIndex) {
  var actions = _gtmtActions();
  if (actionIndex < 0 || actionIndex >= actions.length) return;
  var cur = actions[actionIndex].status || 'todo';
  var next = cur === 'todo' ? 'inprogress' : (cur === 'inprogress' ? 'done' : 'todo');
  window.gtmSetTaskStatus(actionIndex, next);
};

window.gtmTasksToggleView = function (view) {
  var next = (view === 'kanban' || view === 'list')
    ? view
    : (appState.gtmTasksView === 'kanban' ? 'list' : 'kanban');
  appState.gtmTasksView = next;
  _saveLaunchpadState();
  _gtmtRerender();
};

/* ---- Drag-and-drop between Kanban columns ---- */
window._gtmtDragStart = function (event, actionIndex) {
  if (!event.dataTransfer) return;
  event.dataTransfer.setData('text/plain', String(actionIndex));
  event.dataTransfer.effectAllowed = 'move';
  var card = event.currentTarget;
  if (card && card.classList) card.classList.add('gtmt-card--dragging');
};

window._gtmtDragEnd = function (event) {
  var card = event.currentTarget;
  if (card && card.classList) card.classList.remove('gtmt-card--dragging');
};

window._gtmtDragOverColumn = function (event) {
  event.preventDefault();
  if (event.dataTransfer) event.dataTransfer.dropEffect = 'move';
  var col = event.currentTarget;
  if (col && col.classList) col.classList.add('gtmt-column--dropzone');
};

window._gtmtDragLeaveColumn = function (event) {
  var col = event.currentTarget;
  if (!col || !col.classList) return;
  /* Only clear the highlight when leaving the column itself, not moving
     between children within it. */
  if (col.contains(event.relatedTarget)) return;
  col.classList.remove('gtmt-column--dropzone');
};

window._gtmtDropInColumn = function (event, newStatus) {
  event.preventDefault();
  var col = event.currentTarget;
  if (col && col.classList) col.classList.remove('gtmt-column--dropzone');
  var raw = event.dataTransfer && event.dataTransfer.getData('text/plain');
  var idx = parseInt(raw, 10);
  if (isNaN(idx)) return;
  window.gtmSetTaskStatus(idx, newStatus);
};

/* Escape utility (matches _dshEsc style — kept local so we don't accidentally
   depend on a helper that isn't in scope yet). */
function _gtmtEsc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function _gtmtPriorityChip(priority) {
  var p = priority || 'P2';
  var cls = p === 'P0' ? 'gtmt-chip--p0' : (p === 'P1' ? 'gtmt-chip--p1' : 'gtmt-chip--p2');
  return '<span class="gtmt-chip ' + cls + '">' + _gtmtEsc(p) + '</span>';
}

function _gtmtCard(action, index) {
  var status = action.status || 'todo';
  var isDone = status === 'done';
  var doneCheck = isDone ? '<span class="gtmt-card-done-check">\u2713</span>' : '';

  var chips = ''
    + (action.owner    ? '<span class="gtmt-chip gtmt-chip--owner">' + _gtmtEsc(action.owner) + '</span>' : '')
    + (action.timeline ? '<span class="gtmt-chip gtmt-chip--timeline">' + _gtmtEsc(action.timeline) + '</span>' : '')
    + _gtmtPriorityChip(action.priority);

  function btn(label, s) {
    var active = status === s ? ' gtmt-status-active' : '';
    return '<button class="gtmt-status-btn' + active + '"'
      + ' onclick="gtmSetTaskStatus(' + index + ',\'' + s + '\')">' + label + '</button>';
  }

  return '<div class="gtmt-card' + (isDone ? ' gtmt-card--done' : '') + '"'
    + ' draggable="true"'
    + ' ondragstart="_gtmtDragStart(event,' + index + ')"'
    + ' ondragend="_gtmtDragEnd(event)">'
    + doneCheck
    + '<div class="gtmt-card-title">' + _gtmtEsc(action.title || 'Untitled action') + '</div>'
    + (action.desc ? '<div class="gtmt-card-desc">' + _gtmtEsc(action.desc) + '</div>' : '')
    + '<div class="gtmt-card-chips">' + chips + '</div>'
    + '<div class="gtmt-card-status-row">'
    + btn('To Do', 'todo')
    + btn('In Progress', 'inprogress')
    + btn('Done', 'done')
    + '</div>'
    + '</div>';
}

function _gtmtKanban(actions) {
  var buckets = { todo: [], inprogress: [], done: [] };
  actions.forEach(function (a, i) {
    (buckets[a.status || 'todo'] || buckets.todo).push({ action: a, index: i });
  });

  function col(label, key, isDone) {
    var items = buckets[key] || [];
    var body = items.length
      ? items.map(function (it) { return _gtmtCard(it.action, it.index); }).join('')
      : '<div class="gtmt-column-empty">No tasks</div>';
    return '<div class="gtmt-column' + (isDone ? ' gtmt-column--done' : '') + '"'
      + ' ondragover="_gtmtDragOverColumn(event)"'
      + ' ondragleave="_gtmtDragLeaveColumn(event)"'
      + ' ondrop="_gtmtDropInColumn(event,\'' + key + '\')">'
      + '<div class="gtmt-column-header' + (isDone ? ' gtmt-column-header--done' : '') + '">'
      + '<span>' + label + '</span>'
      + '<span class="gtmt-column-count">' + items.length + '</span>'
      + '</div>'
      + body
      + '</div>';
  }

  return '<div class="gtmt-kanban">'
    + col('TO DO', 'todo', false)
    + col('IN PROGRESS', 'inprogress', false)
    + col('DONE', 'done', true)
    + '</div>';
}

function _gtmtList(actions) {
  var rows = actions.map(function (a, i) {
    var status = a.status || 'todo';
    var rowMod = status === 'inprogress'
      ? ' gtmt-list-row--inprogress'
      : (status === 'done' ? ' gtmt-list-row--done' : ' gtmt-list-row--todo');
    var checkMod = status === 'inprogress'
      ? ' gtmt-list-check--inprogress'
      : (status === 'done' ? ' gtmt-list-check--done' : '');
    var chips = ''
      + (a.owner    ? '<span class="gtmt-chip gtmt-chip--owner">' + _gtmtEsc(a.owner) + '</span>' : '')
      + (a.timeline ? '<span class="gtmt-chip gtmt-chip--timeline">' + _gtmtEsc(a.timeline) + '</span>' : '')
      + _gtmtPriorityChip(a.priority);
    return '<div class="gtmt-list-row' + rowMod + '">'
      + '<button class="gtmt-list-check' + checkMod + '"'
      + ' onclick="gtmCycleTaskStatus(' + i + ')"'
      + ' title="Click to change status"></button>'
      + '<div class="gtmt-list-main">'
      + '<div class="gtmt-list-title">' + _gtmtEsc(a.title || 'Untitled action') + '</div>'
      + (a.desc ? '<div class="gtmt-list-desc">' + _gtmtEsc(a.desc) + '</div>' : '')
      + '</div>'
      + '<div class="gtmt-list-chips">' + chips + '</div>'
      + '</div>';
  }).join('');
  return '<div class="gtmt-list">' + rows + '</div>';
}

/* Renders the inner content of the "My Tasks" tab panel — no topbar,
   no screen wrapper. Just the progress row, view toggle, and board. */
function _gtmtTabContent() {
  var actions = _gtmtActions();
  _gtmtEnsureStatuses(actions);

  /* ---- Empty state ---- */
  if (!actions.length) {
    return '<div class="gtmt-empty">'
      + '<div class="gtmt-empty-title">Complete GTM Strategy first to see your action plan.</div>'
      + '<button class="gtmt-empty-btn" onclick="setMode(\'gtm-strategy\')">Go to GTM &#8594;</button>'
      + '</div>';
  }

  var doneCount = actions.filter(function (a) { return a.status === 'done'; }).length;
  var total     = actions.length;
  var pct       = total ? Math.round((doneCount / total) * 100) : 0;
  var allDone   = doneCount === total && total > 0;
  var view      = appState.gtmTasksView === 'list' ? 'list' : 'kanban';

  var progressBlock = allDone
    ? '<div class="gtmt-executed-badge"><span>&#10003;</span> Plan executed</div>'
    : '<div class="gtmt-progress-wrap">'
        + '<div class="gtmt-progress-track"><div class="gtmt-progress-fill" style="width:' + pct + '%"></div></div>'
        + '<div class="gtmt-progress-label">' + doneCount + ' of ' + total + ' actions complete</div>'
      + '</div>';

  var toggle = '<div class="gtmt-view-toggle">'
    + '<button class="gtmt-view-toggle-btn' + (view === 'kanban' ? ' gtmt-active' : '') + '"'
    + ' onclick="gtmTasksToggleView(\'kanban\')">Kanban</button>'
    + '<button class="gtmt-view-toggle-btn' + (view === 'list' ? ' gtmt-active' : '') + '"'
    + ' onclick="gtmTasksToggleView(\'list\')">List</button>'
    + '</div>';

  var boardHtml = view === 'list' ? _gtmtList(actions) : _gtmtKanban(actions);

  return '<div class="gtmt-tab-toolbar">' + progressBlock + toggle + '</div>'
    + boardHtml;
}

/* ===================== LAUNCHPAD PERSISTENCE ===================== */
/* Snapshot the Launchpad journey (onboarding → strategic planning →
   persona → handoff) to localStorage so a refresh resumes where the
   user left off. Content Studio state (createFlow, campaigns, etc.)
   is intentionally excluded — that stays as hardcoded demo data. */
function _saveLaunchpadState() {
  try {
    var toSave = {
      mode: appState.mode,
      concepts: appState.concepts,
      activeConceptId: appState.activeConceptId,
      personaFlow: appState.personaFlow,
      strategyFlow: appState.strategyFlow,
      gtmFlow: appState.gtmFlow,
      onboarding: appState.onboarding,
      user: appState.user,
      _transition: appState._transition || null,
      personaChat: appState.personaChat || { messages: [] },
      campaigns: appState.campaigns
    };
    localStorage.setItem('clarity_launchpad_state', JSON.stringify(toSave));
  } catch (e) { /* localStorage unavailable/full — fail silently */ }
}

/* ===================== PERSONA CHAT ===================== */
function _pfcPersona() {
  var c = window.clarityActiveConcept ? window.clarityActiveConcept() : null;
  return (c && c.persona) || {};
}
function _pfcInitials(name) {
  var parts = (name || '').trim().split(/\s+/);
  if (parts.length >= 2) return parts[0][0].toUpperCase() + parts[1][0].toUpperCase();
  if (parts[0] && parts[0].length >= 2) return parts[0].substring(0, 2).toUpperCase();
  return '?';
}

function _pfcOpeningMessage(p) {
  var first = (p.name || '').trim().split(/\s+/)[0] || 'I';
  var age = p.ageRange || '';
  var c0 = (p.caresAbout && p.caresAbout.length) ? p.caresAbout[0] : '';
  var c1 = (p.caresAbout && p.caresAbout.length > 1) ? p.caresAbout[1] : '';
  var msg = 'Hey. I\u2019m ' + first;
  if (age) msg += ', ' + age;
  msg += '.';
  if (c0 && c1) msg += ' I care a lot about ' + c0 + ' and ' + c1 + '.';
  else if (c0) msg += ' I care a lot about ' + c0 + '.';
  msg += ' What do you want to know?';
  return msg;
}

function _pfcRespond(userText, p, concept) {
  var first = (p.name || '').trim().split(/\s+/)[0] || 'I';
  var c0 = (p.caresAbout && p.caresAbout.length) ? p.caresAbout[0] : 'quality';
  var trigger = (p.trigger || '').trim();
  var desc = (p.description || '').trim();
  var descFirst = desc ? desc.split('.')[0].trim() + '.' : '';
  var ageRange = p.ageRange || '';
  var ci = (concept && concept.strategy && concept.strategy.customerIntelligence) || {};
  var text = (userText || '').toLowerCase();

  if (text.indexOf('buy') !== -1) {
    return first + ' here. Honestly? If it delivers on ' + c0 + ', yes, I\u2019d consider it. ' + (trigger || 'Something that feels right is usually what gets me to move.');
  }
  if (text.indexOf('put you off') !== -1 || text.indexOf('stop you') !== -1 || text.indexOf('barrier') !== -1) {
    var opp = { Quality:'cheap or rushed', Price:'overpriced without proof', Community:'cold and transactional', Trust:'anonymous with no reviews', Convenience:'complicated or high-effort', Speed:'slow and unresponsive', Sustainability:'wasteful or careless', 'Personal Service':'generic and impersonal', Status:'basic and forgettable', Security:'risky and unverified' };
    return first + ' here. What kills it for me is when something feels ' + (opp[c0] || 'off or inauthentic') + '. I\u2019ve been burned before.';
  }
  if (text.indexOf('how do you find') !== -1 || text.indexOf('discover') !== -1) {
    var under35 = false;
    if (ageRange) { var nums = ageRange.match(/\d+/g); if (nums && nums.length && parseInt(nums[0]) < 35) under35 = true; }
    var plat = under35 ? 'Instagram and TikTok' : 'Google and recommendations from friends';
    return first + ' here. Usually through people I already trust. Word of mouth is big for me. I also spend time on ' + plat + '. Ads don\u2019t really move me unless someone I know vouches for it.';
  }
  if (text.indexOf('pay') !== -1 || text.indexOf('price') !== -1 || text.indexOf('cost') !== -1) {
    var wtp = ci.wtpLabel || 'a fair price';
    return first + ' here. For something that genuinely delivers ' + c0 + '? I\u2019d go up to ' + wtp + '. But I\u2019d want to try it first if I can.';
  }
  return first + ' here. That\u2019s a good question. As someone who really values ' + c0 + ', I think about this stuff a lot. ' + (descFirst ? descFirst + ' ' : '') + 'What specifically are you trying to figure out?';
}

function screenPersonaChatPrompt() {

  var initials = _pfcInitials(p.name);

    + '<button class="pfc-send-btn" onclick="pfcSendInput()">Send</button>'

    nextBadge: 'Next: GTM Strategy',

  });

window.pfcSendChip = function (el) {
  var text = el.textContent;
  _pfcSendMessage(text);
};

window.pfcSendInput = function () {
  var input = document.getElementById('pfc-input');
  if (!input) return;
  var text = input.value.trim();
  if (!text) return;
  input.value = '';
  _pfcSendMessage(text);
};

function _pfcSendMessage(text) {
  var msgs = appState.personaChat.messages;
  msgs.push({ role: 'user', text: text, timestamp: Date.now() });
  _saveLaunchpadState();

  var chatEl = document.getElementById('pfc-chat-area');
  if (chatEl) {
    var userBubble = document.createElement('div');
    userBubble.className = 'pfc-msg pfc-msg--user';
    userBubble.textContent = text;
    chatEl.appendChild(userBubble);

    var typing = document.createElement('div');
    typing.className = 'pfc-typing';
    typing.id = 'pfc-typing';
    typing.textContent = '\u2026';
    chatEl.appendChild(typing);
    chatEl.scrollTop = chatEl.scrollHeight;
  }

  var p = _pfcPersona();
  var concept = window.clarityActiveConcept ? window.clarityActiveConcept() : null;
  var response = _pfcRespond(text, p, concept);

  setTimeout(function () {
    msgs.push({ role: 'persona', text: response, timestamp: Date.now() });
    _saveLaunchpadState();
    var t = document.getElementById('pfc-typing');
    if (t) t.remove();
    var area = document.getElementById('pfc-chat-area');
    if (area) {
      var bubble = document.createElement('div');
      bubble.className = 'pfc-msg pfc-msg--persona';
      bubble.textContent = response;
      area.appendChild(bubble);
      area.scrollTop = area.scrollHeight;
    }
  }, 800 + Math.random() * 600);
}

/* ===================== RENDER DISPATCHER ===================== */
function renderApp() {
  if (window.spDestroyAnchorSidebar) window.spDestroyAnchorSidebar();
  _saveLaunchpadState();

  var el = document.getElementById('content');
  var mode = appState.mode;

  if (mode === 'transition') {
    el.innerHTML = screenTransition();
    return;
  }

  if (mode === 'onboarding') {
    el.innerHTML = window.screenOnboarding ? window.screenOnboarding() : '';
    return;
  }

  if (mode === 'strategic-plan') {
    el.innerHTML = window.screenStrategyFlow ? window.screenStrategyFlow() : '';
    if (window.msCheckLoadingHook) window.msCheckLoadingHook();
    return;
  }

  if (mode === 'persona-studio') {
    el.innerHTML = window.screenPersonaFlow ? window.screenPersonaFlow() : '';
    return;
  }

  if (mode === 'persona-chat-prompt') {
    el.innerHTML = screenPersonaChatPrompt();
    return;
  }

  if (mode === 'persona-chat') {
    el.innerHTML = screenPersonaChat();
    pfcScrollToBottom();
    return;
  }

  if (mode === 'gtm-strategy') {
    el.innerHTML = screenGtmStrategy();
    if (window.gtmCheckLoadingHook) window.gtmCheckLoadingHook();
    return;
  }

  if (mode === 'gtm-tasks') {
    el.innerHTML = screenGtmTasks();
    return;
  }

  if (mode === 'launchpad-home') {
    el.innerHTML = screenLaunchpadHome();
    return;
  }

  if (mode === 'dashboard') {
    el.innerHTML = screenDashboard();
    return;
  }

  if (mode === 'report-library') {
    el.innerHTML = screenReportLibrary();
    return;
  }

  if (mode === 'strategic-plan-report') {
    el.innerHTML = window.screenStrategicPlanReport ? window.screenStrategicPlanReport() : '';
    if (window.stageRevealUnifiedReport) requestAnimationFrame(window.stageRevealUnifiedReport);
    return;
  }

  if (mode === 'concept-comparison') {
    el.innerHTML = window.screenConceptComparison ? window.screenConceptComparison() : '';
    return;
  }

  if (mode === 'content-analytics') {
    el.innerHTML = screenContentAnalytics();
    return;
  }

  if (mode === 'campaign-publish') {
    el.innerHTML = window.screenCampaignPublish ? window.screenCampaignPublish() : '';
    return;
  }

  if (mode === 'home') {
    el.innerHTML = screenHome();
    return;
  }

  if (mode === 'wizard') {
    /* If the campaign overlay is already in the DOM, only swap its inner content so the
       slide-in / backdrop animations don't replay on every interaction inside the drawer. */
    if (appState.cpOverlayOpen) {
      var existingBody = el.querySelector('.cf-camp-overlay-body');
      if (existingBody && window.screenCampaign) {
        existingBody.innerHTML = window.screenCampaign();
        return;
      }
    }
    /* Only animate when the step actually changed — not on in-step interactions (tile clicks etc.) */
    var currentStep = appState.createFlow ? appState.createFlow.step : 0;
    var stepChanged = appState._cfPrevStep !== currentStep;
    appState._cfPrevStep = currentStep;

    el.innerHTML = screenCreateFlow();

    if (stepChanged) {
      var next = el.querySelector('.cf-main, .cf-decision-wrap');
      if (next) next.style.animation = 'cf-step-fade 0.18s ease both';
    }
    return;
  }

  /* Library and campaign share the same topbar pattern */
  var topbar = '<div class="app-topbar">'
    + '<span class="app-topbar-brand">Clarity</span>'
    + '<button class="app-topbar-back" onclick="setMode(\'home\')">&#8592; Back to home</button>'
    + '</div>';

  if (mode === 'library') {
    el.innerHTML = topbar + screenLibrary();
  } else if (mode === 'campaign') {
    /* When the campaign flow was launched from the create wizard it renders
       its own topbar inside cpScreenFlow ("← Back to your content" + X),
       so we skip the outer app-topbar to avoid stacking two topbars. */
    var cf = appState.campaignFlow;
    var cUI = appState.campaignUI;
    var fromCreatePage = !!(cf && cf.prefilledFromCreate)
      && !!cUI && cUI.mode === 'flow';
    el.innerHTML = (fromCreatePage ? '' : topbar) + screenCampaign();
  }
}

/* Try to restore a saved Launchpad session. Returns true if it did. */
function _restoreLaunchpadState() {
  try {
    var saved = localStorage.getItem('clarity_launchpad_state');
    if (!saved) return false;

    var parsed = JSON.parse(saved);
    if (!parsed) return false;

    /* ---- Backward compatibility: migrate a pre-concepts flat save (business/
       strategy/persona at the top level) into a single concept object ---- */
    var concepts  = parsed.concepts;
    var activeId  = parsed.activeConceptId;
    if ((!concepts || !concepts.length) && parsed.business) {
      if (!parsed.business.name) return false; /* nothing worth restoring */
      var migrated = clarityFreshConcept({ business: parsed.business });
      migrated.strategy    = parsed.strategy || migrated.strategy;
      migrated.persona     = parsed.persona  || migrated.persona;
      migrated.gtmComplete = (parsed.mode === 'gtm-strategy' || parsed.mode === 'home');
      concepts = [migrated];
      activeId = migrated.id;
    }

    if (!concepts || !concepts.length) return false;

    /* Backfill .gtm on concepts saved before the GTM Strategy flow existed */
    concepts.forEach(function (c) {
      if (!c.gtm) c.gtm = { plan: { actions: [] }, pricing: { inputs: {}, suggestions: [] } };
      if (!c.gtm.plan) c.gtm.plan = { actions: [] };
      if (!c.gtm.pricing) c.gtm.pricing = { inputs: {}, suggestions: [] };
      if (typeof c.contentNudgeSeen !== 'boolean') c.contentNudgeSeen = false;
    });

    var active = null;
    concepts.forEach(function (c) { if (c.id === activeId) active = c; });
    if (!active) active = concepts[0];
    if (!active || !active.business || !active.business.name) return false;

    appState.concepts        = concepts;
    appState.activeConceptId = active.id;
    appState.personaFlow     = parsed.personaFlow  || { step: 1, subStep: 1, screen: 'entry' };
    appState.strategyFlow    = parsed.strategyFlow || { screen: 'hub', marketScan: { step: 1, focus: '' }, customerIntel: { step: 1, focus: '' }, competition: { step: 1, focus: '' } };
    appState.gtmFlow          = parsed.gtmFlow || { step: 'plan-context', planFocus: '', pricingInputs: { avgOrder: '', marketAvg: '', margin: '', bestSeller: '' } };
    appState.onboarding       = parsed.onboarding   || { step: 1, authMode: 'signup', subStep: 1 };
    appState.user             = parsed.user || null;
    appState.personaChat      = parsed.personaChat || { messages: [] };
    if (parsed.campaigns && Array.isArray(parsed.campaigns)) appState.campaigns = parsed.campaigns;

    /* Route based on session state:
       - Authenticated user (appState.user set) always lands on the Dashboard,
         regardless of which screen they were on when they left. (Launchpad
         Home is reachable from there via "Continue".)
       - Logged-out user (appState.user === null, set by clarityLogout) lands
         on the onboarding welcome screen — concepts stay restored in memory
         so signing back in can route them to the dashboard. */
    if (appState.user) {
      appState.mode = 'dashboard';
    } else {
      appState.mode = 'onboarding';
      if (!appState.onboarding || typeof appState.onboarding.step === 'undefined') {
        appState.onboarding = { step: 1, subStep: 1, authMode: 'signup' };
      } else {
        appState.onboarding.step = 1;
      }
    }

    return true;
  } catch (e) {
    return false; /* malformed JSON or storage error — fall through to fresh init */
  }
}

function init() {
  _applySavedTheme();

  /* Intelligence is always on — ensure localStorage agrees */
  localStorage.setItem('clarity_intel_mode', 'on');

  if (_restoreLaunchpadState()) {
    renderApp();
    return;
  }

  _initFresh();
}
window.addEventListener('load', init);

/* Console/testing helper — clears the saved Launchpad session and reloads to Screen 1 */
window.clarityResetAll = function () {
  localStorage.removeItem('clarity_launchpad_state');
  location.reload();
};

/* Log the current user out WITHOUT wiping their concept/strategy/persona/gtm/
   campaign data. Clears just the session (user + onboarding position) so the
   next page load lands on the welcome screen. Signing back in via
   obAdvanceFromAuth() detects the restored concepts and routes to the
   dashboard instead of re-running Business Setup. */
window.clarityLogout = function () {
  appState.user = null;
  if (!appState.onboarding) {
    appState.onboarding = { step: 1, subStep: 1, authMode: 'signup' };
  } else {
    appState.onboarding.step = 1;
  }
  appState.mode = 'onboarding';
  _saveLaunchpadState();
  location.reload();
};

</script>
