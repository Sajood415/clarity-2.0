<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clarity Content Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="onboarding/onboarding.css?v=5">
<link rel="stylesheet" href="studio-strategy/strategy-flow.css?v=7">
<link rel="stylesheet" href="studio-persona/persona-flow.css?v=5">
<link rel="stylesheet" href="studio-gtm/gtm-flow.css?v=1">
<link rel="stylesheet" href="studio-text/studio-text.css?v=6">
<link rel="stylesheet" href="studio-image/studio-image.css?v=4">
<link rel="stylesheet" href="studio-video/studio-video.css?v=4">
<link rel="stylesheet" href="studio-create/create-flow.css?v=9">
<link rel="stylesheet" href="studio-campaign/campaign-flow.css?v=9">
<style>
/* Reset & tokens */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: 'DM Sans', sans-serif; overflow: hidden; }
button { cursor: pointer; border: none; background: none; font-family: inherit; }
input, textarea, select { font-family: inherit; }
a { text-decoration: none; color: inherit; }

:root {
  --bg: #12100e;
  --card: #1c1916;
  --card2: #231f1b;
  --primary: #d4a853;
  --primary-hover: #e6be7a;
  --primary-dim: rgba(212,168,83,0.12);
  --text: #e8e0d5;
  --muted: #9a8f82;
  --border: rgba(255,255,255,0.10);
  --accent: #2dd4bf;
  --warning: #f59e0b;
  --danger: #f87171;
  --radius: 10px;
  --radius-sm: 6px;

  /* Warm brand palette — onboarding, strategic planning, persona studio */
  --ob-bg:        #12100e;
  --ob-surface:   #1c1916;
  --ob-surface2:  #231f1b;
  --ob-border:    rgba(255,255,255,0.08);
  --ob-gold:      #d4a853;
  --ob-gold-dim:  rgba(212,168,83,0.12);
  --ob-gold-rim:  rgba(212,168,83,0.28);
  --ob-teal:      #2dd4bf;
  --ob-teal-dim:  rgba(45,212,191,0.10);
  --ob-teal-rim:  rgba(45,212,191,0.28);
  --ob-coral:     #e07b6a;
  --ob-coral-dim: rgba(224,123,106,0.10);
  --ob-coral-rim: rgba(224,123,106,0.28);
  --ob-green:     #6dba8a;
  --ob-green-dim: rgba(109,186,138,0.10);
  --ob-purple:     #9b7fd4;
  --ob-purple-dim: rgba(155,127,212,0.10);
  --ob-purple-rim: rgba(155,127,212,0.30);
  --ob-muted:     #9a8f82;
  --ob-text:      #e8e0d5;
}

/* ============================================================
   LIGHT THEME OVERRIDES
   ============================================================ */
[data-theme="light"] {
  --bg:           #f5f0e8;
  --card:         #fdf8f2;
  --card2:        #ffffff;
  --text:         #1a1612;
  --muted:        #6b6056;
  --border:       rgba(0,0,0,0.08);
  --primary:      #b8893a;
  --primary-hover:#a07830;
  --primary-dim:  rgba(184,137,58,0.12);
  --accent:       #1fa899;
  --warning:      #d97706;
  --ob-bg:        #f5f0e8;
  --ob-surface:   #fdf8f2;
  --ob-surface2:  #ffffff;
  --ob-border:    rgba(0,0,0,0.08);
  --ob-gold:      #b8893a;
  --ob-gold-dim:  rgba(184,137,58,0.10);
  --ob-gold-rim:  rgba(184,137,58,0.30);
  --ob-teal:      #1fa899;
  --ob-teal-dim:  rgba(31,168,153,0.10);
  --ob-teal-rim:  rgba(31,168,153,0.28);
  --ob-coral:     #c85f4a;
  --ob-coral-dim: rgba(200,95,74,0.10);
  --ob-coral-rim: rgba(200,95,74,0.28);
  --ob-green:     #4f9e6f;
  --ob-green-dim: rgba(79,158,111,0.10);
  --ob-purple:     #7a5fb8;
  --ob-purple-dim: rgba(122,95,184,0.10);
  --ob-purple-rim: rgba(122,95,184,0.30);
  --ob-muted:     #6b6056;
  --ob-text:      #1a1612;
}

/* Text contrast on amber buttons in light mode */
[data-theme="light"] .btn-primary,
[data-theme="light"] .ob-btn-gold,
[data-theme="light"] .sp-btn-save {
  color: #1a1612;
}

/* Toggle switch track — visible in both modes */
[data-theme="light"] .toggle-sw {
  background: rgba(0,0,0,0.14);
}

/* Library hover border visible in light mode */
[data-theme="light"] .lib-btn-rerun:hover,
[data-theme="light"] .lib-btn-run-now:hover {
  border-color: rgba(0,0,0,0.2);
}

/* Prevent fixed theme-toggle from overlapping topbar back buttons */
.app-topbar-back { margin-right: 44px; }

/* ============================================================
   THEME TOGGLE BUTTON (fixed overlay)
   ============================================================ */
.theme-toggle-fixed {
  position: fixed;
  top: 14px;
  right: 18px;
  z-index: 9999;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: var(--card);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--muted);
  transition: color 0.15s, border-color 0.15s, background 0.15s;
  flex-shrink: 0;
}
.theme-toggle-fixed:hover {
  color: var(--text);
  border-color: var(--primary);
}

/* Shell — no sidebar, full screen */
#app { height: 100vh; background: var(--bg); color: var(--text); }
#content { height: 100vh; overflow-y: auto; overflow-x: hidden; background: var(--bg); }

/* ============================================================
   HOME LANDING
   ============================================================ */
.home-wrap {
  display: flex; flex-direction: column; height: 100%; min-height: 100vh;
  position: relative; background: var(--bg);
}

/* Brand wordmark top-left */
.home-brand {
  padding: 20px 36px;
  /* Extra right padding keeps the "v3" meta text clear of the fixed theme-toggle button */
  padding-right: 56px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.home-brand-name {
  font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 700;
  color: var(--text); letter-spacing: 0.01em; line-height: 1;
}
.home-brand-name em { color: var(--primary); font-style: normal; }
.home-brand-meta { font-size: 11px; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; }

/* Centered nudge area */
.home-center {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 0 32px 100px; text-align: center;
}

/* Entrance animation */
@keyframes nudge-enter {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

.home-nudge { max-width: 580px; animation: nudge-enter 0.5s cubic-bezier(.22,.68,0,1.2) both; }

/* State A — strategy ready badge */
.home-status {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 5px 14px; border-radius: 20px;
  background: rgba(45,212,191,0.1); border: 1px solid rgba(45,212,191,0.3);
  color: #2dd4bf; font-size: 11px; font-weight: 600; margin-bottom: 22px;
}
.home-pulse-dot {
  width: 7px; height: 7px; border-radius: 50%; background: #2dd4bf;
  animation: home-pulse 2s ease infinite;
}
@keyframes home-pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }

/* State B — no-intel badge */
.home-warn-badge {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 5px 14px; border-radius: 20px;
  background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.3);
  color: #f59e0b; font-size: 11px; font-weight: 600; margin-bottom: 22px;
}

.home-heading {
  font-family: 'Cormorant Garamond', serif; font-size: 42px; font-weight: 600;
  color: var(--text); line-height: 1.12; margin-bottom: 14px; letter-spacing: -0.01em;
}
.home-sub {
  font-size: 15px; color: var(--muted); line-height: 1.7; margin-bottom: 32px;
  max-width: 440px; margin-left: auto; margin-right: auto;
}
.home-sub strong { color: var(--text); font-weight: 500; }

/* CTA row */
.home-actions {
  display: flex; align-items: center; justify-content: center; gap: 12px;
  margin-bottom: 18px;
}
.btn-lg { padding: 12px 26px !important; font-size: 15px !important; }

/* Campaigns link */
.home-campaigns-link { font-size: 13px; color: var(--muted); margin-top: 4px; }
.home-campaigns-link a { color: var(--primary-hover); }
.home-campaigns-link a:hover { text-decoration: underline; text-underline-offset: 3px; }

/* Intelligence summary cards (State A only) */
.home-intel-cards {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
  max-width: 680px; width: 100%; margin-top: 32px;
  animation: nudge-enter 0.5s 0.1s cubic-bezier(.22,.68,0,1.2) both;
}
.home-intel-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px 18px; text-align: left;
  border-top: 2px solid var(--primary);
}
.home-intel-card-label {
  font-size: 9px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.12em; color: var(--muted); margin-bottom: 9px;
}
.home-intel-card-val { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 4px; line-height: 1.35; }
.home-intel-card-sub { font-size: 11px; color: var(--muted); line-height: 1.5; }

/* Intelligence toggle — bottom-left corner of home screen */
.home-intel-toggle {
  position: absolute; bottom: 28px; left: 28px;
}
.home-intel-toggle-label {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.1em; color: var(--muted); margin-bottom: 8px;
}
.home-toggle-options { display: flex; flex-direction: column; gap: 4px; }
.home-toggle-opt {
  display: flex; align-items: center; gap: 8px; font-size: 12px;
  color: var(--muted); cursor: pointer; padding: 5px 9px;
  border-radius: var(--radius-sm); border: 1px solid transparent;
  transition: all 0.15s; user-select: none;
}
.home-toggle-opt:hover { color: var(--text); background: var(--primary-dim); }
.home-toggle-opt.active { color: var(--text); background: var(--primary-dim); border-color: rgba(212,168,83,0.3); }
.home-toggle-radio-dot {
  width: 13px; height: 13px; border-radius: 50%; flex-shrink: 0;
  border: 2px solid var(--border); display: flex; align-items: center;
  justify-content: center; transition: border-color 0.15s;
}
.home-toggle-opt.active .home-toggle-radio-dot { border-color: var(--primary); }
.home-toggle-opt.active .home-toggle-radio-dot::after {
  content: ''; width: 5px; height: 5px; border-radius: 50%; background: var(--primary);
}

/* ============================================================
   LAUNCHPAD HOME — the one proactive "strategy complete" nudge,
   shown only when a concept has finished market + customer +
   competition + persona + GTM. The graduation moment into Content Studio.
   ============================================================ */
.lp-wrap {
  min-height: 100vh; background: var(--ob-bg); color: var(--ob-text);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  text-align: center; padding: 60px 32px;
  animation: nudge-enter 0.5s cubic-bezier(.22,.68,0,1.2) both;
}
.lp-badge {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 5px 14px; border-radius: 20px;
  background: var(--ob-gold-dim); border: 1px solid rgba(212,168,83,0.3);
  color: var(--ob-gold); font-size: 12px; font-weight: 600; margin-bottom: 28px;
}
.lp-badge-dot {
  width: 7px; height: 7px; border-radius: 50%; background: var(--ob-gold);
  animation: home-pulse 2s ease infinite;
}
.lp-heading {
  font-family: 'Cormorant Garamond', serif; font-size: 44px; font-weight: 600;
  color: var(--ob-text); line-height: 1.15; margin-bottom: 16px; max-width: 640px;
}
.lp-sub {
  font-size: 16px; color: var(--ob-muted); line-height: 1.6; max-width: 480px;
  margin: 0 auto 36px;
}
.lp-cards {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;
  max-width: 680px; width: 100%; margin-bottom: 36px;
}
.lp-card {
  background: var(--ob-surface); border: 1px solid var(--ob-border);
  border-radius: 10px; padding: 16px; text-align: left; border-top: 2px solid transparent;
}
.lp-card-amber  { border-top-color: var(--ob-gold); }
.lp-card-teal   { border-top-color: var(--ob-teal); }
.lp-card-purple { border-top-color: var(--ob-purple); }
.lp-card-label {
  font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em;
  margin-bottom: 8px;
}
.lp-card-amber  .lp-card-label { color: var(--ob-gold); }
.lp-card-teal   .lp-card-label { color: var(--ob-teal); }
.lp-card-purple .lp-card-label { color: var(--ob-purple); }
.lp-card-text { font-size: 13px; color: var(--ob-text); line-height: 1.4; }

/* AI content suggestion cards (post-GTM) */
.lp-suggest-card { display: flex; flex-direction: column; padding: 18px; }
.lp-suggest-angle {
  font-size: 15px; font-weight: 700; color: var(--ob-text);
  line-height: 1.35; margin-bottom: 8px;
}
.lp-suggest-why { font-size: 12px; color: var(--ob-muted); line-height: 1.5; margin-bottom: 14px; }
.lp-suggest-use {
  margin-top: auto; font-size: 13px; font-weight: 600; color: var(--ob-gold);
  cursor: pointer; transition: opacity 0.15s;
}
.lp-suggest-use:hover { opacity: 0.72; }

.lp-actions {
  display: flex; flex-direction: column; align-items: center; gap: 14px;
  max-width: 420px; width: 100%;
}
.lp-cta {
  background: var(--ob-gold); color: #1a1612; border: none; border-radius: var(--radius-sm);
  height: 48px; min-width: 320px; padding: 0 32px; font-size: 18px; font-weight: 600;
  cursor: pointer; transition: filter 0.15s; margin-bottom: 20px;
}
.lp-cta:hover { filter: brightness(1.08); }
.lp-cta-full { width: 100%; min-width: 0; font-size: 16px; margin-bottom: 0; }
.lp-secondary-link {
  font-size: 13px; color: var(--ob-muted); cursor: pointer; transition: color 0.15s;
}
.lp-secondary-link:hover { color: var(--ob-gold); }

/* Light mode — suggestion "Use this" and secondary link stay legible */
[data-theme="light"] .lp-suggest-use { color: var(--ob-gold); }
[data-theme="light"] .lp-secondary-link:hover { color: var(--ob-gold); }
[data-theme="light"] .lp-cta-full { color: #1a1612; }

/* ============================================================
   DASHBOARD — returning user's home base for managing every concept.
   Fixed left sidebar (concept list + new-concept) + right detail panel
   (active concept's progress, one full-width row per module).
   ============================================================ */
.dsh-wrap { display: flex; min-height: 100vh; background: var(--ob-bg); color: var(--ob-text); }

/* ---- Sidebar ---- */
.dsh-sidebar {
  width: 220px; flex-shrink: 0; position: sticky; top: 0; height: 100vh; overflow-y: auto;
  background: var(--ob-surface); border-right: 1px solid rgba(255,255,255,0.07);
  padding: 32px 20px; display: flex; flex-direction: column;
}
[data-theme="light"] .dsh-sidebar { border-right-color: rgba(0,0,0,0.08); }
.dsh-brand { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 700; color: var(--ob-gold); }
.dsh-user-email { font-size: 11px; color: var(--ob-muted); margin-top: 24px; overflow-wrap: break-word; }
.dsh-concepts-label {
  font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em;
  color: var(--ob-gold); margin-top: 32px; margin-bottom: 10px;
}
.dsh-concept-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 2px; }
.dsh-concept-item {
  padding: 10px 12px; border-radius: 8px; cursor: pointer;
  border-left: 2px solid transparent; transition: background 0.15s;
}
.dsh-concept-item:hover { background: rgba(255,255,255,0.03); }
[data-theme="light"] .dsh-concept-item:hover { background: rgba(0,0,0,0.03); }
.dsh-concept-item.active { background: var(--ob-gold-dim); border-left-color: var(--ob-gold); }
.dsh-concept-name { font-size: 13px; color: var(--ob-text); font-weight: 600; line-height: 1.3; overflow-wrap: break-word; }
.dsh-concept-name.dsh-unnamed { font-style: italic; font-weight: 500; color: var(--ob-muted); }
.dsh-concept-type { font-size: 11px; color: var(--ob-muted); margin-top: 2px; }

.dsh-new-concept-btn {
  background: none; border: none; color: var(--ob-gold); font-size: 13px; font-weight: 600;
  cursor: pointer; padding: 10px 4px 4px; text-align: left; margin-top: 12px; flex-shrink: 0;
}
.dsh-new-concept-btn:hover { opacity: 0.75; }

/* Sidebar footer: divider + logout, sits directly below "+ New concept". */
.dsh-sidebar-divider {
  height: 1px; background: rgba(255,255,255,0.06);
  margin: 16px 0; flex-shrink: 0;
}
[data-theme="light"] .dsh-sidebar-divider { background: rgba(0,0,0,0.06); }
.dsh-logout-btn {
  background: none; border: none; color: var(--ob-muted);
  font-size: 13px; cursor: pointer;
  padding: 8px 0; text-align: left; width: 100%;
  transition: color 0.15s;
  font-family: inherit;
  flex-shrink: 0;
}
.dsh-logout-btn:hover { color: var(--ob-text); }

/* ---- Content area ---- */
.dsh-content { flex: 1; min-width: 0; padding: 48px; }
/* ---- Journey panel (right content) ---- */
.dsh-journey-identity {
  padding-bottom: 24px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.dsh-journey-biz-name {
  font-family: 'Cormorant Garamond', serif; font-size: 32px; font-weight: 700;
  color: var(--ob-text); line-height: 1.15; overflow-wrap: break-word;
}
.dsh-journey-biz-name.dsh-unnamed { font-style: italic; font-weight: 500; color: var(--ob-muted); }
.dsh-journey-biz-meta { font-size: 13px; color: var(--ob-muted); margin-top: 6px; }
.dsh-journey-amber-line { width: 48px; height: 2px; background: var(--ob-gold); margin-top: 14px; }

.dsh-journey-progress { margin-top: 24px; margin-bottom: 28px; }
.dsh-journey-progress-label { font-size: 13px; color: var(--ob-muted); margin-bottom: 10px; }
.dsh-journey-progress-track {
  width: 100%; height: 8px; background: rgba(255,255,255,0.06);
  border-radius: 2px; overflow: hidden; margin-bottom: 16px;
}
.dsh-journey-progress-fill {
  height: 100%; background: var(--ob-gold); border-radius: 2px;
  animation: dsh-journey-fill-anim 600ms ease;
}
@keyframes dsh-journey-fill-anim { from { width: 0; } }

.dsh-journey-next-card {
  background: var(--ob-surface); border: 1px solid rgba(212,168,83,0.2);
  border-radius: 12px; padding: 24px; border-left: 3px solid var(--ob-gold);
  margin-bottom: 24px;
}
.dsh-journey-next-eyebrow {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.1em; color: var(--ob-gold); margin-bottom: 10px;
}
.dsh-journey-next-name {
  font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 600;
  color: var(--ob-text); margin-bottom: 8px;
}
.dsh-journey-next-desc {
  font-size: 14px; color: var(--ob-muted); line-height: 1.6; margin-bottom: 12px;
}
.dsh-journey-next-teaser {
  font-size: 12px; font-style: italic; color: var(--ob-muted);
  margin-bottom: 16px; line-height: 1.5;
}
.dsh-journey-btn {
  width: 100%; background: var(--ob-gold); color: #1a1612; border: none;
  border-radius: 6px; height: 44px; font-size: 14px; font-weight: 600;
  cursor: pointer; transition: filter 0.15s; font-family: 'DM Sans', sans-serif;
}
.dsh-journey-btn:hover { filter: brightness(1.08); }

.dsh-journey-insight-cards {
  display: flex; gap: 12px;
}
/* Clickable insight cards — accent color driven via inline --accent CSS variable */
.dsh-journey-insight-card {
  flex: 1; background: var(--ob-surface); border-radius: 10px;
  padding: 12px; min-height: 0;
  position: relative; cursor: pointer;
  border: 1px solid transparent;
  border-top: 3px solid var(--accent, transparent);
  transition: background 150ms ease, border-color 150ms ease;
}
.dsh-journey-insight-card:hover {
  background: rgba(255,255,255,0.03);
  border-right-color: color-mix(in srgb, var(--accent) 50%, transparent);
  border-bottom-color: color-mix(in srgb, var(--accent) 50%, transparent);
  border-left-color: color-mix(in srgb, var(--accent) 50%, transparent);
}
.dsh-journey-insight-card::after {
  content: '\2192';
  position: absolute; right: 10px; bottom: 8px;
  font-size: 11px; color: var(--accent, var(--ob-muted));
  opacity: 0; transition: opacity 150ms ease;
}
.dsh-journey-insight-card:hover::after { opacity: 1; }
.dsh-journey-insight-card-eye {
  font-size: 9px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.1em; margin-bottom: 8px;
}
.dsh-journey-insight-card-val {
  font-size: 13px; font-weight: 700; color: var(--ob-text); line-height: 1.35;
}
.dsh-journey-insight-card-sub {
  font-size: 12px; font-style: italic; color: var(--ob-muted); margin-top: 6px; line-height: 1.4;
}

/* First moves + completed rows keep their base sizing outside the completed-state scope */
.dsh-journey-moves {}
.dsh-journey-moves-label {
  font-size: 9px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.1em; color: var(--ob-muted); margin-bottom: 12px;
}
.dsh-journey-move-row {
  background: var(--ob-surface); border-radius: 8px; padding: 12px 16px;
  margin-bottom: 8px; display: flex; align-items: center; gap: 12px;
}
.dsh-journey-move-num {
  font-size: 13px; font-weight: 700; color: var(--ob-gold); flex-shrink: 0;
}
.dsh-journey-move-title {
  font-size: 13px; color: var(--ob-text); flex: 1; min-width: 0;
}
.dsh-journey-move-owner {
  font-size: 10px; color: var(--ob-muted); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 4px; padding: 2px 8px; flex-shrink: 0;
}
.dsh-journey-moves-link {
  font-size: 12px; color: var(--ob-gold); cursor: pointer; margin-top: 4px;
  transition: opacity 0.15s;
}
.dsh-journey-moves-link:hover { opacity: 0.72; }

.dsh-journey-completed {}
.dsh-journey-completed-label {
  font-size: 9px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.1em; color: var(--ob-muted); margin-bottom: 10px;
}
.dsh-journey-done-item {
  padding: 4px 8px; cursor: pointer; border-radius: 6px;
  transition: background 0.15s; margin-bottom: 12px;
}
.dsh-journey-done-item:last-child { margin-bottom: 0; }
.dsh-journey-done-item:hover { background: rgba(255,255,255,0.03); }
.dsh-journey-done-top {
  display: flex; align-items: center; gap: 8px;
}
.dsh-journey-done-check {
  color: var(--ob-teal); font-size: 12px; font-weight: 700; flex-shrink: 0;
}
.dsh-journey-done-name { font-size: 13px; color: var(--ob-text); font-weight: 600; }
.dsh-journey-done-insight {
  font-size: 11px; font-style: italic; color: var(--ob-muted);
  padding-left: 20px; margin-top: 2px; line-height: 1.4;
}

/* ---------- Completed-state scoped overhaul ---------- */
/* Kill legacy padding/borders that separated sections in the completed panel;
   the labeled dividers below take over that job. */
.dsh-content-complete .dsh-journey-moves,
.dsh-content-complete .dsh-journey-completed {
  padding-bottom: 0; margin-bottom: 0; border-bottom: none;
}

/* Labeled section dividers: a full-width 1px line with the label cutting
   through it (label bg matches page bg, giving the "on top of the line" effect). */
.dsh-content-complete .dsh-journey-moves-label,
.dsh-content-complete .dsh-journey-completed-label {
  position: relative;
  text-align: center;
  margin: 24px 0;
  font-size: 9px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.1em; color: var(--ob-muted);
}
.dsh-content-complete .dsh-journey-moves-label::before,
.dsh-content-complete .dsh-journey-completed-label::before {
  content: '';
  position: absolute; left: 0; right: 0; top: 50%;
  height: 1px; background: rgba(255,255,255,0.06);
}
.dsh-content-complete .dsh-journey-moves-label > span,
.dsh-content-complete .dsh-journey-completed-label > span {
  position: relative;
  display: inline-flex; align-items: center;
  padding: 0 8px; background: var(--ob-bg);
}
.dsh-journey-completed-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--ob-teal); margin-right: 6px; flex-shrink: 0;
  display: inline-block;
}

/* First moves rows — action-item styling */
.dsh-content-complete .dsh-journey-move-row {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  border-left: 3px solid var(--ob-gold);
  border-radius: 8px;
  padding: 14px 16px;
  margin-bottom: 8px;
}
.dsh-content-complete .dsh-journey-move-owner {
  font-size: 11px;
  color: var(--ob-gold);
  background: rgba(212,168,83,0.1);
  border: 1px solid rgba(212,168,83,0.2);
  border-radius: 4px;
  padding: 3px 10px;
}
.dsh-content-complete .dsh-journey-moves-link {
  font-size: 13px;
  color: var(--ob-gold);
  font-weight: 500;
  margin-top: 8px;
  display: inline-flex; align-items: center; gap: 4px;
}
.dsh-content-complete .dsh-journey-moves-link:hover { opacity: 1; }
.dsh-journey-arrow {
  display: inline-block;
  transition: transform 200ms ease;
}
.dsh-content-complete .dsh-journey-moves-link:hover .dsh-journey-arrow {
  transform: translateX(3px);
}

/* Mini action bar — both GTM links in one row */
.dsh-journey-action-bar {
  display: flex; align-items: center; gap: 0;
  background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
  border-radius: 8px; padding: 10px 16px; margin-top: 12px;
}
.dsh-journey-action-bar-link {
  flex: 1; font-size: 13px; cursor: pointer; opacity: 0.8;
  transition: opacity 150ms;
}
.dsh-journey-action-bar-link:hover { opacity: 1; }
.dsh-journey-action-bar-gold { color: var(--ob-gold); text-align: left; }
.dsh-journey-action-bar-teal { color: var(--ob-teal); text-align: right; }
.dsh-journey-action-bar-divider {
  width: 1px; height: 16px; background: rgba(255,255,255,0.1);
  margin: 0 16px; flex-shrink: 0;
}
[data-theme="light"] .dsh-journey-action-bar {
  border-color: rgba(0,0,0,0.08);
}
[data-theme="light"] .dsh-journey-action-bar-divider {
  background: rgba(0,0,0,0.1);
}

/* Completed items — clearly clickable cards with hover arrow */
.dsh-content-complete .dsh-journey-done-item {
  position: relative;
  padding: 10px 14px;
  padding-right: 32px;
  margin-bottom: 6px;
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(255,255,255,0.05);
  border-radius: 8px;
  transition: background 150ms ease, border-color 150ms ease, transform 150ms ease;
}
.dsh-content-complete .dsh-journey-done-item:hover {
  background: rgba(255,255,255,0.05);
  border-color: rgba(255,255,255,0.1);
  transform: translateX(2px);
}
.dsh-content-complete .dsh-journey-done-name {
  font-size: 13px; color: var(--ob-text); font-weight: 700;
}
.dsh-content-complete .dsh-journey-done-insight {
  margin-top: 2px;
}
.dsh-journey-done-arrow {
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--ob-muted);
  font-size: 12px;
  transition: color 150ms ease;
}
.dsh-content-complete .dsh-journey-done-item:hover .dsh-journey-done-arrow {
  color: var(--ob-gold);
}

/* CTA caption + amber glow on the primary Content Studio button */
.dsh-journey-cta-caption {
  font-size: 12px;
  color: var(--ob-muted);
  text-align: center;
  margin-top: 24px;
  margin-bottom: 12px;
}
.dsh-journey-btn-cta {
  box-shadow: 0 0 20px rgba(212,168,83,0.15);
  transition: box-shadow 200ms ease, transform 200ms ease, filter 150ms ease;
}
.dsh-journey-btn-cta:hover {
  box-shadow: 0 0 30px rgba(212,168,83,0.25);
  transform: translateY(-1px);
}

/* Light mode — journey panel */
[data-theme="light"] .dsh-journey-identity { border-bottom-color: rgba(0,0,0,0.06); }
[data-theme="light"] .dsh-journey-progress-track { background: rgba(0,0,0,0.06); }
[data-theme="light"] .dsh-journey-next-card {
  border-color: rgba(184,137,58,0.25); border-left-color: var(--ob-gold);
}
[data-theme="light"] .dsh-journey-move-owner { border-color: rgba(0,0,0,0.1); }
[data-theme="light"] .dsh-journey-done-item:hover { background: rgba(0,0,0,0.03); }
[data-theme="light"] .dsh-journey-btn { color: #1a1612; }

[data-theme="light"] .dsh-journey-insight-card:hover {
  background: rgba(0,0,0,0.03);
}
[data-theme="light"] .dsh-content-complete .dsh-journey-moves-label::before,
[data-theme="light"] .dsh-content-complete .dsh-journey-completed-label::before {
  background: rgba(0,0,0,0.06);
}
[data-theme="light"] .dsh-content-complete .dsh-journey-move-row {
  background: rgba(0,0,0,0.02);
  border-color: rgba(0,0,0,0.06);
  border-left-color: var(--ob-gold);
}
[data-theme="light"] .dsh-content-complete .dsh-journey-done-item {
  background: rgba(0,0,0,0.02);
  border-color: rgba(0,0,0,0.05);
}
[data-theme="light"] .dsh-content-complete .dsh-journey-done-item:hover {
  background: rgba(0,0,0,0.05);
  border-color: rgba(0,0,0,0.1);
  transform: translateX(2px);
}
[data-theme="light"] .dsh-content-complete .dsh-journey-done-item:hover .dsh-journey-done-arrow {
  color: var(--ob-gold);
}

/* ============================================================
   CONTENT STUDIO NUDGE BELL — dashboard only. Fixed alongside the
   global theme toggle; only rendered while a concept has completed
   GTM and hasn't been nudged toward Content Studio yet.
   ============================================================ */
@keyframes dsh-bell-pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.3); }
}
.dsh-bell-btn {
  position: fixed; top: 12px; right: 58px; z-index: 500;
  width: 36px; height: 36px; border-radius: 50%;
  background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; margin-right: 8px; color: var(--ob-text);
}
.dsh-bell-dot {
  position: absolute; top: 6px; right: 6px;
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--ob-gold);
  animation: dsh-bell-pulse 1.5s ease infinite;
}
@keyframes dsh-bell-fade-in {
  from { opacity: 0; transform: translateY(-8px); }
  to { opacity: 1; transform: translateY(0); }
}
.dsh-bell-dropdown {
  position: absolute; top: 48px; right: 0; width: 280px;
  background: var(--ob-surface); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 12px; padding: 20px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  z-index: 200; cursor: default; text-align: left;
  animation: dsh-bell-fade-in 300ms ease;
}
.dsh-bell-new-badge {
  display: inline-block; font-size: 9px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.05em; color: var(--ob-gold);
  background: rgba(212,168,83,0.1); border-radius: 4px; padding: 2px 8px;
  margin-bottom: 12px;
}
.dsh-bell-heading { font-size: 15px; font-weight: 700; color: var(--ob-text); }
.dsh-bell-body { font-size: 13px; color: var(--ob-muted); margin-top: 6px; line-height: 1.5; }
.dsh-bell-cta {
  display: block; width: 100%; background: var(--ob-gold); color: #1a1612; border: none;
  border-radius: 6px; height: 40px; font-size: 13px; font-weight: 600;
  cursor: pointer; transition: filter 0.15s; font-family: 'DM Sans', sans-serif;
  margin-top: 16px;
}
.dsh-bell-cta:hover { filter: brightness(1.08); }
.dsh-bell-dismiss {
  display: block; text-align: center; font-size: 11px; color: var(--ob-muted);
  cursor: pointer; margin-top: 10px; opacity: 0.8; transition: opacity 150ms;
}
.dsh-bell-dismiss:hover { opacity: 1; text-decoration: underline; }

[data-theme="light"] .dsh-bell-btn { border-color: rgba(0,0,0,0.1); background: rgba(0,0,0,0.04); }
[data-theme="light"] .dsh-bell-dropdown {
  border-color: rgba(0,0,0,0.1);
  box-shadow: 0 8px 32px rgba(0,0,0,0.12);
}
[data-theme="light"] .dsh-bell-cta { color: #1a1612; }

/* ============================================================
   CONTENT ANALYTICS
   ============================================================ */
.ca-screen {
  display: flex; flex-direction: column; min-height: 100vh; background: var(--ob-bg);
}
.ca-topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 24px; border-bottom: 1px solid rgba(255,255,255,0.06);
  flex-shrink: 0;
}
.ca-topbar-back {
  background: none; border: none; color: var(--ob-muted); font-size: 13px;
  cursor: pointer; font-family: 'DM Sans', sans-serif; padding: 0;
  transition: color 0.15s;
}
.ca-topbar-back:hover { color: var(--ob-text); }
.ca-topbar-label {
  font-size: 13px; font-weight: 700; color: var(--ob-gold);
  text-transform: uppercase; letter-spacing: 0.08em;
  padding-right: 56px;
}
.ca-body {
  flex: 1; padding: 40px 32px 60px;
  max-width: 960px; margin: 0 auto; width: 100%;
}
.ca-header { margin-bottom: 32px; }
.ca-heading {
  font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 600;
  color: var(--ob-text); margin: 0 0 8px;
}
.ca-sub { font-size: 14px; color: var(--ob-muted); margin: 0; line-height: 1.5; }

/* Summary bar */
.ca-summary {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 32px;
}
.ca-stat-card {
  background: var(--ob-surface); border-radius: 10px; padding: 16px 20px;
  border: 1px solid rgba(255,255,255,0.07);
}
.ca-stat-label {
  font-size: 9px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.08em; color: var(--ob-muted); margin-bottom: 8px;
}
.ca-stat-val {
  font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 700;
  color: var(--ob-text); line-height: 1;
}
.ca-stat-sub { font-size: 11px; color: var(--ob-muted); margin-top: 6px; }

/* AI Insight card */
.ca-insight {
  background: rgba(212,168,83,0.05); border: 1px solid rgba(212,168,83,0.2);
  border-radius: 12px; padding: 20px 24px; margin-bottom: 32px;
  display: flex; align-items: center; gap: 24px;
}
.ca-insight-left { flex: 1; }
.ca-insight-badge {
  display: inline-block; font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.06em;
  color: var(--ob-gold); background: rgba(212,168,83,0.1);
  border-radius: 4px; padding: 2px 8px; margin-bottom: 10px;
}
.ca-insight-text { font-size: 14px; color: var(--ob-text); margin: 0; line-height: 1.55; }
.ca-insight-right { flex-shrink: 0; }
.ca-insight-cta {
  background: var(--ob-gold); color: #1a1612; border: none; border-radius: 6px;
  padding: 10px 20px; font-size: 13px; font-weight: 600; cursor: pointer;
  font-family: 'DM Sans', sans-serif; white-space: nowrap; transition: filter 0.15s;
}
.ca-insight-cta:hover { filter: brightness(1.08); }

/* Content list */
.ca-list-label {
  font-size: 9px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.08em; color: var(--ob-muted); margin-bottom: 16px;
}
.ca-row {
  background: var(--ob-surface); border-radius: 8px; padding: 14px 16px;
  margin-bottom: 8px; display: flex; align-items: center; gap: 16px;
  border: 1px solid rgba(255,255,255,0.06);
}
.ca-row-thumb {
  width: 40px; height: 40px; border-radius: 6px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 700;
}
.ca-row-info { flex: 1; min-width: 0; }
.ca-row-title { font-size: 14px; font-weight: 700; color: var(--ob-text); }
.ca-row-platform { font-size: 12px; color: var(--ob-muted); margin-top: 2px; }
.ca-row-status {
  display: flex; align-items: center; gap: 5px;
  font-size: 11px; color: var(--ob-teal); margin-top: 3px;
}
.ca-row-status-dot {
  width: 5px; height: 5px; border-radius: 50%; background: var(--ob-teal);
}
.ca-row-stats { display: flex; gap: 20px; flex-shrink: 0; }
.ca-row-metric { text-align: center; }
.ca-row-metric-val { display: block; font-size: 13px; font-weight: 600; color: var(--ob-text); }
.ca-row-metric-label { display: block; font-size: 10px; color: var(--ob-muted); margin-top: 2px; }

/* Empty state */
.ca-empty { text-align: center; padding: 60px 0; }
.ca-empty-msg { font-size: 14px; color: var(--ob-muted); margin-bottom: 20px; line-height: 1.5; }
.ca-empty-cta {
  background: var(--ob-gold); color: #1a1612; border: none; border-radius: 6px;
  height: 44px; padding: 0 28px; font-size: 14px; font-weight: 600;
  cursor: pointer; font-family: 'DM Sans', sans-serif; transition: filter 0.15s;
}
.ca-empty-cta:hover { filter: brightness(1.08); }

/* Mobile */
@media (max-width: 768px) {
  .ca-summary { grid-template-columns: repeat(2, 1fr); }
  .ca-insight { flex-direction: column; align-items: flex-start; }
  .ca-row-stats { flex-direction: column; gap: 8px; }
  .ca-body { padding: 24px 20px 40px; }
}
@media (max-width: 480px) {
  .ca-summary { grid-template-columns: 1fr; }
}

/* Light mode */
[data-theme="light"] .ca-topbar { border-bottom-color: rgba(0,0,0,0.06); }
[data-theme="light"] .ca-stat-card { border-color: rgba(0,0,0,0.08); }
[data-theme="light"] .ca-insight { border-color: rgba(184,137,58,0.25); background: rgba(184,137,58,0.04); }
[data-theme="light"] .ca-insight-cta { color: #1a1612; }
[data-theme="light"] .ca-row { border-color: rgba(0,0,0,0.06); }
[data-theme="light"] .ca-empty-cta { color: #1a1612; }

/* ============================================================
   GTM TASKS BOARD — full-screen kanban + list of GTM plan
   action items. Own mode: 'gtm-tasks'. All classes prefixed gtmt-.
   ============================================================ */
.gtmt-screen {
  min-height: 100vh; display: flex; flex-direction: column;
  background: var(--ob-bg); color: var(--ob-text);
}
.gtmt-topbar {
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px; padding: 14px 24px; padding-right: 56px;
  border-bottom: 1px solid var(--ob-border); background: var(--ob-surface);
  flex-shrink: 0;
}
.gtmt-topbar-brand {
  flex: 1; text-align: center;
  font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 600;
  color: var(--ob-gold);
}
.gtmt-body { flex: 1; padding: 32px 48px 64px; max-width: 1280px; width: 100%; margin: 0 auto; }
.gtmt-header {
  display: flex; align-items: flex-start; justify-content: space-between; gap: 24px;
  margin-bottom: 24px;
}
.gtmt-header-left { min-width: 0; }
.gtmt-header-biz {
  font-family: 'Cormorant Garamond', serif; font-size: 24px; font-weight: 700;
  color: var(--ob-text); line-height: 1.2;
}
.gtmt-header-sub { font-size: 13px; color: var(--ob-muted); margin-top: 4px; }

/* Toolbar row that sits above the board: progress on the left,
   Kanban/List view toggle on the right. */
.gtmt-tab-toolbar {
  display: flex; align-items: flex-start; justify-content: space-between;
  gap: 24px; margin: 8px 0 22px;
}
.gtmt-tab-toolbar .gtmt-progress-wrap { flex: 1; }
.gtmt-tab-toolbar .gtmt-executed-badge { margin-bottom: 0; }

/* View toggle */
.gtmt-view-toggle {
  display: inline-flex; align-items: center;
  background: var(--ob-surface); border: 1px solid var(--ob-border);
  border-radius: 8px; padding: 3px; flex-shrink: 0;
}
.gtmt-view-toggle-btn {
  padding: 6px 14px; font-size: 12px; font-weight: 500;
  color: var(--ob-muted); background: transparent; border: none;
  border-radius: 6px; cursor: pointer; transition: color 150ms, background 150ms;
}
.gtmt-view-toggle-btn:hover { color: var(--ob-text); }
.gtmt-view-toggle-btn.gtmt-active {
  background: var(--ob-gold); color: #1a1612; font-weight: 600;
}

/* Progress row */
.gtmt-progress-wrap { margin-bottom: 32px; }
.gtmt-progress-track {
  width: 100%; height: 4px; background: rgba(255,255,255,0.06);
  border-radius: 2px; overflow: hidden;
}
.gtmt-progress-fill {
  height: 100%; background: var(--ob-gold); border-radius: 2px;
  transition: width 400ms ease;
}
.gtmt-progress-label {
  font-size: 12px; color: var(--ob-muted); margin-top: 8px;
}

/* Executed badge (all 5 done) */
.gtmt-executed-badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 12px; font-size: 11px; font-weight: 700;
  color: var(--ob-gold); background: rgba(212,168,83,0.12);
  border: 1px solid rgba(212,168,83,0.3); border-radius: 999px;
  margin-bottom: 12px; animation: gtmt-pulse 2s ease-in-out infinite;
}
@keyframes gtmt-pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(212,168,83,0.35); }
  50%      { box-shadow: 0 0 0 8px rgba(212,168,83,0); }
}

/* Kanban */
.gtmt-kanban {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;
}
.gtmt-column {
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(255,255,255,0.05);
  border-radius: 12px; padding: 14px; min-height: 200px;
}
.gtmt-column-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 4px 12px; margin-bottom: 10px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  font-size: 9px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.1em; color: var(--ob-muted);
}
.gtmt-column-header--done { color: var(--ob-teal); }
.gtmt-column-count {
  display: inline-flex; align-items: center; justify-content: center;
  min-width: 20px; height: 18px; padding: 0 6px;
  background: rgba(255,255,255,0.06); border-radius: 9px;
  font-size: 10px; font-weight: 700; color: var(--ob-muted);
}
.gtmt-column-header--done .gtmt-column-count {
  background: rgba(45,212,191,0.14); color: var(--ob-teal);
}
.gtmt-column-empty {
  font-size: 12px; color: var(--ob-muted); font-style: italic;
  padding: 12px 4px; text-align: center;
}

/* Task card (kanban) */
.gtmt-card {
  position: relative;
  background: var(--ob-surface); border-radius: 10px;
  padding: 16px; border: 1px solid rgba(255,255,255,0.07);
  margin-bottom: 10px; cursor: grab;
  transition: border-color 150ms, transform 150ms, opacity 150ms;
}
.gtmt-card:last-child { margin-bottom: 0; }
.gtmt-card:hover { border-color: rgba(255,255,255,0.14); }
.gtmt-card:active { cursor: grabbing; }
.gtmt-card--done { opacity: 0.6; }
.gtmt-card--dragging {
  opacity: 0.4;
  border-color: var(--ob-gold);
  cursor: grabbing;
}
.gtmt-column--dropzone {
  background: rgba(212,168,83,0.08);
  border-color: rgba(212,168,83,0.35);
}
[data-theme="light"] .gtmt-column--dropzone {
  background: rgba(212,168,83,0.14);
  border-color: rgba(212,168,83,0.45);
}
.gtmt-card-done-check {
  position: absolute; top: 12px; right: 12px;
  color: var(--ob-teal); font-size: 14px; font-weight: 700;
}
.gtmt-card-title {
  font-size: 14px; font-weight: 700; color: var(--ob-text);
  line-height: 1.35; padding-right: 22px; /* room for the done-check */
}
.gtmt-card-desc {
  font-size: 12px; color: var(--ob-muted); line-height: 1.5;
  margin-top: 6px;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden;
}
.gtmt-card-chips {
  display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px;
}

.gtmt-chip {
  display: inline-flex; align-items: center;
  font-size: 10px; font-weight: 600;
  padding: 3px 8px; border-radius: 4px;
  border: 1px solid transparent;
}
.gtmt-chip--owner {
  color: var(--ob-gold);
  background: rgba(212,168,83,0.1);
  border-color: rgba(212,168,83,0.22);
}
.gtmt-chip--timeline {
  color: var(--ob-muted);
  background: rgba(255,255,255,0.04);
  border-color: rgba(255,255,255,0.08);
}
.gtmt-chip--p0 { color: var(--ob-coral); border-color: rgba(224,123,106,0.4); background: rgba(224,123,106,0.08); }
.gtmt-chip--p1 { color: var(--ob-gold);  border-color: rgba(212,168,83,0.4);  background: rgba(212,168,83,0.08); }
.gtmt-chip--p2 { color: var(--ob-muted); border-color: rgba(255,255,255,0.15); background: rgba(255,255,255,0.04); }

/* Status buttons */
.gtmt-card-status-row {
  display: flex; gap: 4px; margin-top: 14px;
  padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.06);
}
.gtmt-status-btn {
  flex: 1;
  padding: 5px 4px; font-size: 10px; font-weight: 600;
  color: var(--ob-muted); background: transparent;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 4px; cursor: pointer;
  transition: background 150ms, color 150ms, border-color 150ms;
  text-align: center;
}
.gtmt-status-btn:hover {
  color: var(--ob-text); border-color: rgba(255,255,255,0.16);
}
.gtmt-status-btn.gtmt-status-active {
  background: var(--ob-gold); color: #1a1612; border-color: var(--ob-gold);
}

/* List view */
.gtmt-list {
  display: flex; flex-direction: column; gap: 0;
}
.gtmt-list-row {
  display: flex; align-items: center; gap: 14px;
  background: var(--ob-surface); border-radius: 8px;
  padding: 14px 16px; margin-bottom: 8px;
  border: 1px solid rgba(255,255,255,0.06);
  border-left: 3px solid var(--ob-gold); /* default: todo */
  transition: transform 150ms, border-color 150ms;
}
.gtmt-list-row:hover { transform: translateX(2px); }
.gtmt-list-row--todo       { border-left-color: var(--ob-gold); }
.gtmt-list-row--inprogress { border-left-color: #a78bfa; /* purple */ }
.gtmt-list-row--done       { border-left-color: var(--ob-teal); opacity: 0.75; }

.gtmt-list-check {
  flex-shrink: 0;
  width: 20px; height: 20px; border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.2);
  cursor: pointer; background: transparent;
  position: relative;
  transition: border-color 150ms, background 150ms;
}
.gtmt-list-check--inprogress {
  background: linear-gradient(90deg, #a78bfa 50%, transparent 50%);
  border-color: #a78bfa;
}
.gtmt-list-check--done {
  background: var(--ob-teal); border-color: var(--ob-teal);
}
.gtmt-list-check--done::after {
  content: '\2713'; position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  color: #0a0a0a; font-size: 12px; font-weight: 700;
}

.gtmt-list-main { flex: 1; min-width: 0; }
.gtmt-list-title {
  font-size: 14px; font-weight: 700; color: var(--ob-text);
  line-height: 1.35;
}
.gtmt-list-row--done .gtmt-list-title { text-decoration: line-through; }
.gtmt-list-desc {
  font-size: 12px; color: var(--ob-muted);
  margin-top: 3px; line-height: 1.4;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden;
}
.gtmt-list-chips {
  display: flex; gap: 6px; flex-shrink: 0; align-items: center;
}

/* Empty state */
.gtmt-empty {
  max-width: 460px; margin: 96px auto 0; text-align: center;
}
.gtmt-empty-title {
  font-family: 'Cormorant Garamond', serif; font-size: 22px;
  color: var(--ob-text); margin-bottom: 12px;
}
.gtmt-empty-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 10px 20px; font-size: 13px; font-weight: 600;
  background: var(--ob-gold); color: #1a1612;
  border: none; border-radius: 6px; cursor: pointer;
  transition: filter 150ms;
}
.gtmt-empty-btn:hover { filter: brightness(1.08); }

/* Responsive: collapse kanban to a single column, hide chips on list */
@media (max-width: 900px) {
  .gtmt-body { padding: 24px 20px 48px; }
  .gtmt-kanban { grid-template-columns: 1fr; }
  .gtmt-header { flex-direction: column; align-items: stretch; }
  .gtmt-tab-toolbar { flex-direction: column; align-items: stretch; gap: 12px; }
  .gtmt-list-chips { display: none; }
}

/* Light-mode overrides */
[data-theme="light"] .gtmt-column {
  background: rgba(0,0,0,0.02); border-color: rgba(0,0,0,0.06);
}
[data-theme="light"] .gtmt-column-header { border-bottom-color: rgba(0,0,0,0.06); }
[data-theme="light"] .gtmt-column-count { background: rgba(0,0,0,0.06); color: var(--ob-muted); }
[data-theme="light"] .gtmt-progress-track { background: rgba(0,0,0,0.06); }
[data-theme="light"] .gtmt-card { border-color: rgba(0,0,0,0.08); }
[data-theme="light"] .gtmt-card:hover { border-color: rgba(0,0,0,0.16); }
[data-theme="light"] .gtmt-card-status-row { border-top-color: rgba(0,0,0,0.06); }
[data-theme="light"] .gtmt-status-btn { border-color: rgba(0,0,0,0.1); }
[data-theme="light"] .gtmt-status-btn:hover { border-color: rgba(0,0,0,0.22); }
[data-theme="light"] .gtmt-view-toggle { border-color: rgba(0,0,0,0.1); }
[data-theme="light"] .gtmt-list-row { border-color: rgba(0,0,0,0.08); }
[data-theme="light"] .gtmt-list-check { border-color: rgba(0,0,0,0.22); }
[data-theme="light"] .gtmt-chip--timeline {
  background: rgba(0,0,0,0.04); border-color: rgba(0,0,0,0.08);
}
[data-theme="light"] .gtmt-chip--p2 {
  border-color: rgba(0,0,0,0.15); background: rgba(0,0,0,0.04);
}

/* ============================================================
   APP TOP BAR (wizard / library / campaign modes)
   ============================================================ */
.app-topbar {
  position: sticky; top: 0; z-index: 200;
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 26px; background: var(--card); border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.app-topbar-brand {
  font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 700; color: var(--primary);
}
.app-topbar-back {
  display: inline-flex; align-items: center; gap: 6px; font-size: 13px;
  color: var(--muted); cursor: pointer; padding: 6px 12px; border-radius: var(--radius-sm);
  border: 1px solid var(--border); background: none; transition: all 0.15s;
}
.app-topbar-back:hover { color: var(--text); border-color: var(--primary); }

/* ============================================================
   CAMPAIGN OVERLAY (slides over wizard step 6)
   ============================================================ */
.cf-camp-overlay-backdrop {
  position: fixed; inset: 0; z-index: 9000;
  background: rgba(8,12,24,0.78);
  display: flex; align-items: stretch; justify-content: flex-end;
  animation: overlay-backdrop-in 0.22s ease;
}
@keyframes overlay-backdrop-in { from { opacity: 0; } to { opacity: 1; } }
.cf-camp-overlay-panel {
  width: 88%; max-width: 1000px; height: 100%;
  background: var(--bg);
  display: flex; flex-direction: column; overflow: hidden;
  border-left: 1px solid var(--border);
  box-shadow: -16px 0 56px rgba(0,0,0,0.55);
  animation: overlay-slide-in 0.3s cubic-bezier(.22,.68,0,1.05) both;
}
@keyframes overlay-slide-in { from { transform: translateX(100%); } to { transform: translateX(0); } }

/* Overlay body: flex column so the cf-screen fills it and internal scroll works */
.cf-camp-overlay-body {
  flex: 1; overflow: hidden;
  display: flex; flex-direction: column;
}
/* Override cf-screen defaults inside overlay so topbar/footer stay fixed and only .cf-body scrolls */
.cf-camp-overlay-body .cf-screen {
  flex: 1; min-height: 0; display: flex; flex-direction: column;
}
.cf-camp-overlay-body .cf-body {
  flex: 1; min-height: 0;
}
/* Ensure the campaign main area scrolls independently inside the panel */
.cf-camp-overlay-body .cp-main {
  overflow-y: auto; height: 100%;
}
/* ============================================================
   STYLED CONFIRM MODAL (replaces window.confirm)
   ============================================================ */
.clarity-modal-backdrop {
  position: fixed; inset: 0; z-index: 9999;
  background: rgba(8,12,24,0.82);
  display: flex; align-items: center; justify-content: center;
  animation: overlay-backdrop-in 0.18s ease;
}
.clarity-modal {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 28px 28px 24px;
  max-width: 380px; width: 90%;
  box-shadow: 0 24px 56px rgba(0,0,0,0.55);
  animation: cf-step-fade 0.18s ease both;
}
.clarity-modal-title {
  font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 600;
  color: var(--text); margin-bottom: 8px;
}
.clarity-modal-body {
  font-size: 13px; color: var(--muted); line-height: 1.6; margin-bottom: 24px;
}
.clarity-modal-actions { display: flex; gap: 10px; justify-content: flex-end; }

/* Close X button in overlay topbar */
.cf-overlay-close-x {
  width: 32px; height: 32px; padding: 0;
  display: flex; align-items: center; justify-content: center;
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  color: var(--muted); font-size: 16px; cursor: pointer;
  transition: all 0.15s; background: none;
}
.cf-overlay-close-x:hover { color: var(--danger); border-color: var(--danger); background: rgba(248,113,113,0.08); }

/* ============================================================
   SHARED UI
   ============================================================ */
.card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
.pill { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; }
.pill-green { background: rgba(45,212,191,0.12); color: #2dd4bf; }
.pill-indigo { background: var(--primary-dim); color: var(--primary-hover); }
.pill-amber { background: rgba(245,158,11,0.12); color: #f59e0b; }
.pill-red { background: rgba(248,113,113,0.12); color: #f87171; }
.pill-muted { background: rgba(154,160,180,0.12); color: var(--muted); }
.screen { padding: 28px; min-height: 100%; }
.screen-header { margin-bottom: 24px; }
.screen-title { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 600; color: var(--text); }
.screen-sub { font-size: 13px; color: var(--muted); margin-top: 4px; }
.flex-between { display: flex; align-items: center; justify-content: space-between; }
.label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 6px; }
.mono { font-family: 'DM Mono', monospace; font-size: 11px; }
.tag { display: inline-flex; padding: 2px 8px; border-radius: 4px; font-size: 11px; border: 1px solid var(--border); color: var(--muted); }
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; transition: all 0.15s; cursor: pointer; border: 1px solid transparent; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-hover); }
.btn-outline { border-color: var(--border); color: var(--muted); }
.btn-outline:hover { border-color: var(--primary); color: var(--text); }
.btn-ghost { color: var(--muted); }
.btn-ghost:hover { color: var(--text); background: var(--primary-dim); }
.btn-sm { padding: 5px 10px; font-size: 12px; }
.modal-close { color: var(--muted); font-size: 20px; cursor: pointer; }
.modal-close:hover { color: var(--text); }

/* Wizard steps (Text + Image) */
.wizard-steps { display: flex; align-items: center; gap: 0; margin-bottom: 28px; }
.wizard-step { display: flex; align-items: center; }
.wiz-dot { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; }
.wiz-dot.done { background: var(--accent); color: #fff; }
.wiz-dot.active { background: var(--primary); color: #fff; box-shadow: 0 0 0 3px var(--primary-dim); }
.wiz-dot.pending { background: var(--card2); color: var(--muted); border: 1px solid var(--border); }
.wiz-line { height: 2px; width: 40px; background: var(--border); }
.wiz-line.done { background: var(--accent); }
.wiz-label { font-size: 10px; color: var(--muted); margin-top: 6px; white-space: nowrap; }

/* Toggles */
.toggle-sw { width: 36px; height: 20px; background: rgba(255,255,255,0.18); border-radius: 10px; position: relative; transition: all 0.2s; cursor: pointer; flex-shrink: 0; }
.toggle-sw.on { background: var(--primary); }
.toggle-knob { width: 16px; height: 16px; background: #fff; border-radius: 50%; position: absolute; top: 2px; left: 2px; transition: all 0.2s; }
.toggle-sw.on .toggle-knob { left: 18px; }

/* Persona fit */
.pf-chip { display: inline-flex; align-items: center; gap: 5px; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 600; cursor: pointer; }
.pf-chip.green { background: rgba(45,212,191,0.12); color: #2dd4bf; border: 1px solid rgba(45,212,191,0.3); }
.pf-chip.amber { background: rgba(245,158,11,0.12); color: #f59e0b; border: 1px solid rgba(245,158,11,0.3); }
.pf-chip.red { background: rgba(248,113,113,0.12); color: #f87171; border: 1px solid rgba(248,113,113,0.3); }
.pf-chip-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
.pf-breakdown { display: flex; flex-direction: column; gap: 8px; }
.pf-dim { display: flex; align-items: center; gap: 10px; }
.pf-dim-name { width: 100px; font-size: 11px; color: var(--muted); }
.pf-dim-bar { flex: 1; height: 6px; border-radius: 3px; background: var(--border); overflow: hidden; }
.pf-dim-fill { height: 100%; border-radius: 3px; background: var(--primary); }
.pf-dim-val { width: 32px; text-align: right; font-size: 11px; font-weight: 600; font-family: 'DM Mono', monospace; color: var(--text); }

/* Compliance + brand voice (Text wizard) */
.ch-compliance { display: inline-flex; align-items: center; gap: 5px; padding: 3px 8px; border-radius: 6px; font-size: 11px; font-family: 'DM Mono', monospace; }
.ch-compliance.ok { background: rgba(45,212,191,0.1); color: #2dd4bf; }
.ch-compliance.warn { background: rgba(245,158,11,0.1); color: #f59e0b; }
.ch-compliance.fail { background: rgba(248,113,113,0.1); color: #f87171; }
.bv-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); }
.bv-meter-bar { height: 8px; border-radius: 4px; background: var(--border); overflow: hidden; margin-bottom: 4px; }
.bv-meter-fill { height: 100%; border-radius: 4px; }
.bv-meter-fill.good { background: #2dd4bf; }
.bv-meter-fill.warn { background: #f59e0b; }

/* Evidence rail (Text wizard) */
.evidence-item { padding: 10px 12px; border-radius: 8px; background: var(--card2); border: 1px solid var(--border); margin-bottom: 8px; }
.evidence-tag { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; padding: 2px 7px; border-radius: 4px; margin-bottom: 6px; display: inline-block; }
.evidence-tag.research { background: rgba(212,168,83,0.12); color: var(--primary-hover); }
.evidence-tag.social { background: rgba(245,158,11,0.12); color: #f59e0b; }
.evidence-text { font-size: 12px; color: var(--text); line-height: 1.5; }
.evidence-source { font-size: 10px; color: var(--muted); margin-top: 4px; }

/* Approvals (Audio) */
.approval-rail { display: flex; flex-direction: column; gap: 8px; }
.approval-step { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px; background: var(--card2); border: 1px solid var(--border); }
.approval-step.done { border-color: rgba(45,212,191,0.35); background: rgba(45,212,191,0.06); }
.approval-step.active { border-color: var(--primary); background: var(--primary-dim); }
.approval-icon { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; }
.approval-icon.done { background: rgba(45,212,191,0.15); color: #2dd4bf; }
.approval-icon.active { background: var(--primary-dim); color: var(--primary-hover); }
.approval-meta { flex: 1; }
.approval-name { font-size: 12px; font-weight: 600; color: var(--text); }
.approval-who { font-size: 11px; color: var(--muted); }

/* Audio studio */
.audio-chapter-list { display: flex; flex-direction: column; gap: 6px; margin-top: 10px; }
.audio-chapter { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-radius: 8px; background: var(--card2); border: 1px solid var(--border); cursor: pointer; }
.audio-chapter.playing { border-color: #2dd4bf; background: rgba(45,212,191,0.06); }
.audio-ch-num { width: 20px; height: 20px; border-radius: 50%; background: var(--border); display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: var(--muted); flex-shrink: 0; }
.audio-ch-num.playing { background: #2dd4bf; color: #fff; }
.audio-ch-title { flex: 1; font-size: 12px; color: var(--text); }
.audio-ch-dur { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--muted); }

/* Create home (used by create-flow.js internals) */
.create-hero { max-width: 960px; margin: 0 auto; }
.create-status { display: inline-flex; align-items: center; gap: 8px; padding: 6px 14px; border-radius: 20px; background: rgba(45,212,191,0.1); border: 1px solid rgba(45,212,191,0.3); color: #2dd4bf; font-size: 11px; font-weight: 600; margin-bottom: 16px; }
.create-status-dot { width: 7px; height: 7px; border-radius: 50%; background: #2dd4bf; animation: create-pulse 2s ease infinite; }
@keyframes create-pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
.create-intel-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
.create-intel-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
.create-intel-val { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
.create-intel-sub { font-size: 12px; color: var(--muted); line-height: 1.45; }
.create-brief-bar { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 18px; margin-bottom: 24px; }
.create-brief-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; margin-top: 10px; }
.create-brief-field label { display: block; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 4px; }
.create-brief-field input, .create-brief-field select { width: 100%; background: var(--card2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 10px; color: var(--text); font-size: 13px; outline: none; }
.create-modality-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
.create-modality { background: var(--card); border: 2px solid var(--border); border-radius: var(--radius); padding: 20px 14px; text-align: center; cursor: pointer; transition: all 0.2s; }
.create-modality:hover { border-color: var(--primary); transform: translateY(-2px); }
.create-modality.selected { border-color: var(--primary); background: var(--primary-dim); }
.create-modality-icon { font-size: 28px; margin-bottom: 8px; }
.create-modality-name { font-size: 14px; font-weight: 600; }
.create-modality-desc { font-size: 11px; color: var(--muted); margin-top: 4px; }
.create-cta-row { display: flex; align-items: center; gap: 12px; }
.create-flow-hint { font-size: 12px; color: var(--muted); }

/* ============================================================

   ============================================================ */
@keyframes tr-enter {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes tr-leave {
  from { opacity: 1; transform: translateY(0); }
  to   { opacity: 0; transform: translateY(-10px); }
}
@keyframes tr-circle-in {
  from { opacity: 0; transform: scale(0.55); }
  to   { opacity: 1; transform: scale(1); }
}
@keyframes tr-check-draw {
  from { stroke-dashoffset: 42; }
  to   { stroke-dashoffset: 0; }
}
@keyframes tr-text-up {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

.tr-screen {

  background: var(--bg);

  align-items: center;

.tr-content {

.tr-title {

.tr-next-badge {

.tr-next-badge::before {

<body>
<!-- Convenience links (separate pages) -->
<!-- /studio-text/  /studio-image/  /studio-video/  /studio-audio/ -->
<!-- ===================== APP SHELL ===================== -->
<div id="app">
  <div id="content"></div>
</div>
<button id="theme-toggle-btn" class="theme-toggle-fixed" onclick="clarityToggleTheme()" title="Switch to light mode"></button>

<script>
/* ===================== SHARED INTELLIGENCE DATA ===================== */
var CLARITY_SAMPLE_INTELLIGENCE = {
  brand: 'Hearth Bakery',
  persona: {
    name: 'Maya Holloway',
    seg: 'Local foodie · 28–45 · drives for quality',
    insight: 'Values authenticity over trends. Responds to process stories and limited-batch urgency.'
  },
  market: {
    whiteSpace: 'Artisan craft vs ghost-kitchen convenience — competitors sell speed, Hearth sells patience.',
    gap: '68% of food-tech startups shuttered since 2023; artisan bakeries grew 14% CAGR.',
    trend: 'Slow food · local sourcing · behind-the-scenes content'
  },
  consumer: {
    trigger: 'Fear of missing the batch. Motivator: feeling part of a community, not a transaction.',
    research: 'Pre-order conversion lifts 34% when ferment process is shown. Peak engagement Sat 8–11am.'
  }
};

/* ===================== STATE ===================== */
var appState = {
  mode: 'onboarding',
  cpOverlayOpen: false,
  user: null,
  onboarding: { step: 1, authMode: 'signup' },
  concepts: [],
  activeConceptId: null,
  createBrief: {
    goal: 'Drive weekend pre-orders',
    message: 'Sourdough Saturday is back — 72-hour cold ferment, stone-baked, limited batch. Craft over convenience.',
    persona: 'Maya Holloway',
    whyNow: 'Seasonal launch · Summer 2026'
  },
  intelligence: JSON.parse(JSON.stringify(CLARITY_SAMPLE_INTELLIGENCE)),
  personaChat: { messages: [] },
  gtmTasksView: 'kanban',
  dshBellOpen: false,
  _dshBellAutoOpenedFor: null
};

/* ===================== CONCEPTS ===================== */
/* A "concept" bundles one business idea's full Launchpad data — business
   info, the three Strategic Planning modules, the persona, and whether
   GTM has been reached. A user can have multiple concepts; only one is
   "active" (being worked on) at a time. */
function clarityFreshConcept(overrides) {
  var o = overrides || {};
  return {
    id: 'concept_' + Date.now() + '_' + Math.floor(Math.random() * 10000),
    createdAt: Date.now(),
    business: {
      name: (o.business && o.business.name) || '',
      description: (o.business && o.business.description) || '',
      type: (o.business && o.business.type) || null,
      locations: (o.business && o.business.locations) || []
    },
    strategy: { marketScan: null, customerIntelligence: null, competition: null },
    persona: { name: '', ageRange: '', description: '', caresAbout: [], otherTraits: '', trigger: '' },
    gtm: { plan: { actions: [] }, pricing: { inputs: {}, suggestions: [] } },
    gtmComplete: false,
    contentNudgeSeen: false
  };
}

/* Create a new concept, register it, and make it the active one */
window.clarityCreateConcept = function (overrides) {
  var concept = clarityFreshConcept(overrides);
  if (!appState.concepts) appState.concepts = [];
  appState.concepts.push(concept);
  appState.activeConceptId = concept.id;
  return concept;
};

/* Return the currently active concept object, or null */
window.clarityActiveConcept = function () {
  if (!appState.concepts || !appState.concepts.length) return null;
  var found = null;
  appState.concepts.forEach(function (c) {
    if (c.id === appState.activeConceptId) found = c;
  });
  return found;
};

/* Bridge the Launchpad journey's real concept data into the Content Studio
   wizard. Called right before every navigation from a Launchpad screen into
   Content Studio, so createBrief/intelligence reflect the concept the user
   actually built instead of the static demo values. If there's no active
   concept, this is a no-op and the wizard falls back to its demo data. */
window.claritySyncConceptToStudio = function () {
  var concept = window.clarityActiveConcept ? window.clarityActiveConcept() : null;
  if (!concept) return;

  var biz = concept.business || {};
  var s   = concept.strategy || {};
  var p   = concept.persona  || {};
  var g   = concept.gtm      || {};

  var firstActionTitle = (g.plan && g.plan.actions && g.plan.actions.length && g.plan.actions[0] && g.plan.actions[0].title)
    ? g.plan.actions[0].title : '';
  var gapHeadline = (s.marketScan && s.marketScan.gapHeadline) ? s.marketScan.gapHeadline : '';
  var whitespace  = (s.competition && s.competition.whitespace) ? s.competition.whitespace : '';
  var topTrigger  = (s.customerIntelligence && s.customerIntelligence.topTrigger) ? s.customerIntelligence.topTrigger : '';
  var caresAbout  = (p.caresAbout && p.caresAbout.length) ? p.caresAbout : [];
  var personaName = (p.name && p.name.trim()) ? p.name.trim() : '';

  var brief = appState.createBrief || {};
  brief.goal    = firstActionTitle || 'Grow my customer base';
  brief.message = gapHeadline || biz.description || brief.message;
  brief.persona = personaName || brief.persona;
  brief.whyNow  = 'Based on your ' + (biz.type || '') + ' strategy \u00b7 ' + new Date().getFullYear();
  brief.proof   = caresAbout.length ? ('Your customer cares about ' + caresAbout.slice(0, 2).join(' and ')) : brief.proof;
  brief.cta     = firstActionTitle || brief.cta;
  appState.createBrief = brief;

  localStorage.setItem('clarity_intel_mode', 'on');

  appState.intelligence = {
    brand: { name: biz.name || '', voice: biz.type || '', market: gapHeadline || '' },
    persona: {
      name: personaName || 'Your customer',
      seg: (p.ageRange || '') + ' \u00b7 ' + (caresAbout[0] || ''),
      insight: p.trigger || caresAbout[0] || ''
    },
    market: { whiteSpace: whitespace || '', gap: gapHeadline || '', trend: '' },
    consumer: { trigger: p.trigger || '', research: topTrigger || '' }
  };

  appState.createFlow = appState.createFlow || {};
  appState.createFlow.step = 1;
  appState.createFlow.modality = null;
  appState.createFlow.platform = null;
  appState.createFlow.format = null;
  appState.createFlow.variation = null;
  appState.createFlow.published = false;

  /* Any entry into Content Studio for this concept counts as "nudged" —
     hides the dashboard notification bell going forward. */
  concept.contentNudgeSeen = true;
  _saveLaunchpadState();
};

/* ===================== STYLED CONFIRM MODAL ===================== */
function showConfirmModal(opts) {
  var existing = document.getElementById('clarity-modal-root');
  if (existing) existing.remove();
  var el = document.createElement('div');
  el.id = 'clarity-modal-root';
  el.className = 'clarity-modal-backdrop';
  el.innerHTML = '<div class="clarity-modal">'
    + '<div class="clarity-modal-title">' + (opts.title || 'Are you sure?') + '</div>'
    + '<div class="clarity-modal-body">' + (opts.body || '') + '</div>'
    + '<div class="clarity-modal-actions">'
    + '<button class="btn btn-outline" id="cm-cancel">' + (opts.cancelLabel || 'Keep editing') + '</button>'
    + '<button class="btn btn-primary" id="cm-confirm">' + (opts.confirmLabel || 'Discard &amp; exit') + '</button>'
    + '</div></div>';
  document.body.appendChild(el);
  el.querySelector('#cm-cancel').onclick = function () { el.remove(); };
  el.querySelector('#cm-confirm').onclick = function () { el.remove(); opts.onConfirm && opts.onConfirm(); };
  el.onclick = function (e) { if (e.target === el) el.remove(); };
}

/* ===================== SECTION TRANSITION ===================== */
var _trTimer = null;

function setTransition(opts) {
  /* opts: { title, summary, nextBadge, nextMode } */
  if (_trTimer) { clearTimeout(_trTimer); _trTimer = null; }
  appState.mode = 'transition';
  appState._transition = opts;
  renderApp();
  /* After pause, fade out then advance */
  _trTimer = setTimeout(function () {
    var el = document.getElementById('tr-screen');
    if (el) el.classList.add('tr-leaving');
    setTimeout(function () {
      _trTimer = null;
      setMode(opts.nextMode);
    }, 270);
  }, 1500);
}

function screenTransition() {
  var t = appState._transition || {};
  var title   = t.title   || 'Done';
  var summary = t.summary || '';
  var badge   = t.nextBadge || '';

  var checkSvg = '<svg class="tr-check-svg" width="72" height="72" viewBox="0 0 64 64" fill="none">'
    + '<circle class="tr-check-circle" cx="32" cy="32" r="29" stroke="#d4a853" stroke-width="2"/>'
    + '<path class="tr-check-path" d="M18 32 l10 10 l18-18"'
    + ' stroke="#d4a853" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>'
    + '</svg>';

  return '<div class="tr-screen" id="tr-screen">'
    + '<div class="tr-content">'
    + '<div class="tr-check-wrap">' + checkSvg + '</div>'
    + '<div class="tr-title">' + title + '</div>'
    + (summary ? '<div class="tr-summary">' + summary + '</div>' : '')
    + (badge   ? '<div class="tr-next-badge">' + badge + '</div>' : '')
    + '</div>'
    + '</div>';
}

/* ===================== MODE SYSTEM ===================== */
function setMode(mode) {
  appState.mode = mode;
  /* Keep appState.screen in sync for backward compat with module files */
  if (mode === 'wizard') appState.screen = 'create-flow';
  else if (mode === 'library') appState.screen = 'library';
  else if (mode === 'report-library') appState.screen = 'report-library';
  else if (mode === 'strategic-plan-report') appState.screen = 'strategic-plan-report';
  else if (mode === 'concept-comparison') appState.screen = 'concept-comparison';
  else if (mode === 'campaign') appState.screen = 'campaign';
  else if (mode === 'onboarding') appState.screen = 'onboarding';
  else if (mode === 'strategic-plan') appState.screen = 'strategic-plan';
  else if (mode === 'persona-studio') appState.screen = 'persona-studio';
  else if (mode === 'persona-chat-prompt') appState.screen = 'persona-chat-prompt';
  else if (mode === 'persona-chat') appState.screen = 'persona-chat';
  else if (mode === 'gtm-strategy') appState.screen = 'gtm-strategy';
  else if (mode === 'gtm-tasks') appState.screen = 'gtm-tasks';
  else if (mode === 'launchpad-home') appState.screen = 'launchpad-home';
  else if (mode === 'dashboard') appState.screen = 'dashboard';
  else appState.screen = 'home';
  renderApp();
}

/* Compatibility shim for module files that call nav() */
function nav(screen) {
  if (screen === 'create-flow') setMode('wizard');
  else if (screen === 'library' || screen === 'history') setMode('library');
  else if (screen === 'campaign') setMode('campaign');
  else setMode('home');
}

/* ===================== INTELLIGENCE TOGGLE ===================== */
function clarityGetIntelMode() {
  return localStorage.getItem('clarity_intel_mode') || 'on';
}

window.claritySetIntelMode = function(mode) {
  localStorage.setItem('clarity_intel_mode', mode);
  if (mode === 'off') appState.intelligence = null;
  renderApp();
};

/* ===================== CONTENT ANALYTICS ===================== */
function _caSeededRandom(seed) {
  var x = Math.sin(seed + 1) * 10000;
  return x - Math.floor(x);
}

function screenContentAnalytics() {
  var items = appState.createdItems || [];
  var concept = window.clarityActiveConcept ? window.clarityActiveConcept() : null;
  var persona = (concept && concept.persona) || {};
  var topCare = (persona.caresAbout && persona.caresAbout.length) ? persona.caresAbout[0] : 'quality and trust';

  /* Topbar */
  var topbar = '<div class="ca-topbar">'
    + '<button class="ca-topbar-back" onclick="setMode(\'home\')">&larr; Back to Content Studio</button>'
    + '<span class="ca-topbar-label">Analytics</span>'
    + '</div>';

  /* Header */
  var header = '<div class="ca-header">'
    + '<h1 class="ca-heading">Content Performance</h1>'
    + '<p class="ca-sub">Every piece of content you create helps Clarity understand what works for your audience.</p>'
    + '</div>';

  if (!items.length) {
    var empty = '<div class="ca-empty">'
      + '<p class="ca-empty-msg">No content published yet. Create your first piece to start seeing performance data.</p>'
      + '<button class="ca-empty-cta" onclick="claritySyncConceptToStudio(); setMode(\'wizard\')">Create content &#8594;</button>'
      + '</div>';
    return '<div class="ca-screen">' + topbar + '<div class="ca-body">' + header + empty + '</div></div>';
  }

  /* Summary bar */
  var summary = '<div class="ca-summary">'
    + '<div class="ca-stat-card"><div class="ca-stat-label">TOTAL REACH</div><div class="ca-stat-val" style="color:var(--ob-gold)">12,400</div><div class="ca-stat-sub">across all published content</div></div>'
    + '<div class="ca-stat-card"><div class="ca-stat-label">AVG PERSONA FIT</div><div class="ca-stat-val" style="color:var(--ob-teal)">84%</div><div class="ca-stat-sub">based on your persona match</div></div>'
    + '<div class="ca-stat-card"><div class="ca-stat-label">BEST FORMAT</div><div class="ca-stat-val">Image Post</div><div class="ca-stat-sub">highest average reach</div></div>'
    + '<div class="ca-stat-card"><div class="ca-stat-label">CONTENT PIECES</div><div class="ca-stat-val" style="color:var(--ob-purple)">' + items.length + '</div><div class="ca-stat-sub">created so far</div></div>'
    + '</div>';

  /* AI Insight card */
  var insight = '<div class="ca-insight">'
    + '<div class="ca-insight-left">'
    + '<span class="ca-insight-badge">CLARITY INSIGHT</span>'
    + '<p class="ca-insight-text">Based on your content performance, your audience responds best to process-led visuals and community-focused messaging. Your next piece should lean into <strong>' + topCare + '</strong> to maintain momentum.</p>'
    + '</div>'
    + '<div class="ca-insight-right">'
    + '<button class="ca-insight-cta" onclick="claritySyncConceptToStudio(); setMode(\'wizard\')">Create recommended content &#8594;</button>'
    + '</div>'
    + '</div>';

  /* Content list */
  var modalityColors = { Written: { bg: 'rgba(155,127,212,0.3)', fg: '#9b7fd4' }, Image: { bg: 'rgba(212,168,83,0.3)', fg: 'var(--ob-gold)' }, Video: { bg: 'rgba(45,212,191,0.3)', fg: 'var(--ob-teal)' }, Audio: { bg: 'rgba(224,123,106,0.3)', fg: 'var(--ob-coral)' } };
  var fallbackColor = { bg: 'rgba(255,255,255,0.08)', fg: 'var(--ob-muted)' };

  var listRows = items.map(function (item, idx) {
    var mod = item.modality || 'Written';
    var mc = modalityColors[mod] || fallbackColor;
    var title = (item.title && item.title.trim()) ? item.title.trim() : mod + ' ' + (item.format || 'Post');
    var platform = item.platform || '';

    var reach = Math.floor(800 + _caSeededRandom(idx * 3) * 3200);
    var fit   = Math.floor(70 + _caSeededRandom(idx * 3 + 1) * 25);
    var eng   = (2.1 + _caSeededRandom(idx * 3 + 2) * 6.3).toFixed(1);

    return '<div class="ca-row">'
      + '<div class="ca-row-thumb" style="background:' + mc.bg + ';color:' + mc.fg + '">' + mod.charAt(0) + '</div>'
      + '<div class="ca-row-info">'
      + '<div class="ca-row-title">' + title + '</div>'
      + (platform ? '<div class="ca-row-platform">' + platform + '</div>' : '')
      + '<div class="ca-row-status"><span class="ca-row-status-dot"></span>Published</div>'

function screenReportLibrary() {
